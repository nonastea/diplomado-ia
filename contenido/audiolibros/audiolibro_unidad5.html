<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Del reporte del mes a la mejor jugada para cada cliente</title>
<style>
  :root{
    --bg:#0F1512; --card:#18201C; --card2:#1F2925;
    --ink:#EAF1EE; --soft:#93A099; --green:#2FBF95; --green-deep:#1B8E6E;
    --amber:#E0A45C; --line:#2A342F; --hl:#22332C;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:18px;line-height:1.62;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #app{display:flex;flex-direction:column;height:100dvh;max-width:760px;margin:0 auto;}

  /* HEADER */
  header{padding:16px 20px 12px;border-bottom:1px solid var(--line);flex:0 0 auto;}
  .eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--green);margin:0 0 4px;}
  header h1{font-size:1.12rem;font-weight:800;margin:0;line-height:1.25;letter-spacing:-.2px;}

  /* TEXTO */
  #reader{flex:1 1 auto;overflow-y:auto;padding:18px 20px 200px;-webkit-overflow-scrolling:touch;}
  .seg{margin:0 0 14px;color:var(--soft);transition:color .25s,background .25s;padding:3px 10px;border-radius:9px;cursor:pointer;scroll-margin-top:20px;}
  .seg.chap{color:var(--ink);font-weight:800;font-size:1.2rem;margin:26px 0 12px;line-height:1.28;}
  .seg.active{color:var(--ink);background:var(--hl);}
  .seg.chap.active{background:var(--hl);}
  .seg.done{color:#5f6b64;}

  /* CONTROLES */
  .bar{
    position:fixed;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;
    background:linear-gradient(180deg,rgba(15,21,18,0) 0%,var(--bg) 22%);
    padding:14px 18px calc(16px + env(safe-area-inset-bottom));
  }
  .progress{height:5px;background:var(--card2);border-radius:4px;overflow:hidden;margin:0 2px 12px;}
  .progress i{display:block;height:100%;width:0;background:var(--green);transition:width .3s;}
  .ctrls{display:flex;align-items:center;justify-content:center;gap:14px;}
  button{font-family:inherit;color:var(--ink);border:none;background:var(--card);border-radius:14px;cursor:pointer;}
  .btn-skip{width:56px;height:56px;font-size:.78rem;font-weight:700;line-height:1.05;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
  .btn-skip span{font-size:1.15rem;}
  .btn-play{width:74px;height:74px;border-radius:50%;background:var(--green);color:#08110D;font-size:2rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(47,191,149,.35);}
  .btn-play:active{transform:scale(.94);}
  .row2{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;}
  .pill{background:var(--card);border-radius:12px;padding:9px 12px;font-size:.86rem;color:var(--soft);display:flex;align-items:center;gap:8px;font-weight:600;}
  .pill b{color:var(--ink);}
  select{font-family:inherit;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:9px 12px;font-size:.86rem;font-weight:600;max-width:46vw;}
  .spd{display:flex;gap:6px;}
  .spd button{padding:8px 11px;font-size:.82rem;font-weight:700;background:var(--card);color:var(--soft);border-radius:10px;}
  .spd button.on{background:var(--green);color:#08110D;}

  /* SHEET capítulos */
  #chapBtn{background:var(--card);border-radius:12px;padding:9px 14px;font-size:.86rem;font-weight:700;color:var(--ink);}
  .sheet{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:20;}
  .sheet.open{display:block;}
  .sheet-inner{position:absolute;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;background:var(--card2);border-radius:20px 20px 0 0;max-height:72dvh;overflow-y:auto;padding:10px 0 24px;}
  .sheet-inner h3{margin:14px 22px;font-size:.78rem;text-transform:uppercase;letter-spacing:.6px;color:var(--soft);}
  .chap-item{padding:14px 22px;font-weight:600;border-top:1px solid var(--line);cursor:pointer;}
  .chap-item:active{background:var(--hl);}
  .chap-item .cn{color:var(--green);font-weight:800;margin-right:10px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <p class="eyebrow">Audiolibro · voz del dispositivo</p>
    <h1>Del reporte del mes a la mejor jugada para cada cliente</h1>
  </header>
  <div id="reader"></div>
</div>

<div class="bar">
  <div class="progress"><i id="pfill"></i></div>
  <div class="ctrls">
    <button class="btn-skip" id="prev"><span>&#9664;</span>Anterior</button>
    <button class="btn-play" id="play">&#9658;</button>
    <button class="btn-skip" id="next">Siguiente<span>&#9654;</span></button>
  </div>
  <div class="row2">
    <button id="chapBtn">&#9776; Capítulos</button>
    <div class="spd">
      <button data-r="0.9">0.9&times;</button>
      <button data-r="1" class="on">1&times;</button>
      <button data-r="1.25">1.25&times;</button>
      <button data-r="1.5">1.5&times;</button>
    </div>
  </div>
  <div class="row2">
    <div class="pill">Voz</div>
    <select id="voice"></select>
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <h3>Capítulos</h3>
    <div id="chapList"></div>
  </div>
</div>

<script>
const SEGS = [{"t": "La inteligencia artificial, explicada desde el mundo comercial", "c": false}, {"t": "Del reporte del mes a la mejor jugada para cada cliente", "c": true}, {"t": "Piensa en un mes cualquiera de tu trabajo. Miras cuánto se vendió y cuántos afiliados se traspasaron ( qué pasó ). Intuyes por qué (¿mejoró la competencia? ¿fallamos en un reclamo?). Hueles quién está por irse. Y decides a quién llamar primero y qué ofrecerle. Todos los días haces ese recorrido con tu cartera, casi sin pensarlo.", "c": false}, {"t": "Esta guía te muestra que los datos pueden hacer ese mismo viaje —de mirar el pasado a decidir la mejor jugada— pero a gran escala y para miles de clientes a la vez. Y lo vas a entender rápido, porque tú ya haces las cuatro etapas. Solo les vamos a poner nombre.", "c": false}, {"t": "El recorrido", "c": true}, {"t": "1 La gran idea: tus datos hacen un viaje en cuatro etapas", "c": false}, {"t": "2 Etapa 1 — ¿Qué pasó? (y cómo preguntarle a los datos hablando)", "c": false}, {"t": "3 Etapa 2 — ¿Por qué pasó? (cazar la causa sin perderte)", "c": false}, {"t": "4 Etapa 3 — ¿Qué va a pasar? (anticiparte, como ya lo haces)", "c": false}, {"t": "5 La trampa del dato que no deberías tener", "c": false}, {"t": "6 Etapa 4 — ¿Qué hago? (la mejor jugada para cada cliente)", "c": false}, {"t": "7 Todo junto: la empresa que dejó de perder clientes", "c": false}, {"t": "Tus datos hacen un viaje en cuatro etapas", "c": true}, {"t": "Ya, antes de meternos en herramientas y nombres raros, quédate con una sola idea, porque es el mapa de toda la unidad.", "c": false}, {"t": "Cuando trabajas tu cartera, sin darte cuenta pasas por cuatro momentos. Primero miras qué pasó : cuánto vendiste, cuántos se fueron. Después te preguntas por qué pasó : capaz que la competencia mejoró su oferta, capaz que fallamos en un reclamo. Luego anticipas qué va a pasar : ese afiliado calladito que hace tres meses no contesta, lo hueles, se va a ir. Y por último decides qué hago : a este lo llamo hoy y le ofrezco esto; a este otro mejor lo dejo tranquilo.", "c": false}, {"t": "Esos cuatro momentos —qué pasó, por qué, qué va a pasar, qué hago— son exactamente las cuatro etapas por las que la IA hace viajar a los datos. Cada una tiene su nombre técnico, y así se ven:", "c": false}, {"t": "Las cuatro etapas del viaje de los datos · de mirar atrás a decidir adelante.", "c": false}, {"t": "La etapa", "c": false}, {"t": "La pregunta que responde", "c": false}, {"t": "En tu mundo", "c": false}, {"t": "Descriptivo", "c": false}, {"t": "¿Qué pasó?", "c": false}, {"t": "El reporte del mes: cuánto se vendió, cuántos se fueron", "c": false}, {"t": "Diagnóstico", "c": false}, {"t": "¿Por qué pasó?", "c": false}, {"t": "Por qué cayeron los traspasos este trimestre", "c": false}, {"t": "Predictivo", "c": false}, {"t": "¿Qué va a pasar?", "c": false}, {"t": "Quién está por traspasarse el mes que viene", "c": false}, {"t": "Prescriptivo", "c": false}, {"t": "¿Qué hago?", "c": false}, {"t": "A quién llamar y qué ofrecerle para que se quede", "c": false}, {"t": "Y hay algo importante: las cuatro etapas son una escalera, no cajones sueltos. No puedes decidir bien la jugada (etapa 4) si no sabes a quién se le va a ir (etapa 3). No anticipas bien (etapa 3) si no entendiste por qué se fue la gente antes (etapa 2). Y no entiendes el porqué (etapa 2) si tus números del pasado están mal hechos (etapa 1). Cada peldaño se apoya en el de abajo.", "c": false}, {"t": "Etapa 1 — ¿Qué pasó? (y cómo preguntarle a los datos hablando)", "c": true}, {"t": "La primera etapa es la más conocida, y es la que ya vives: mirar el pasado. Cuánto se vendió el trimestre, qué producto salió más, cómo venían los traspasos. Es el reporte de siempre. En el curso a esto se le llama análisis descriptivo , y responde una sola pregunta: ¿qué pasó?", "c": false}, {"t": "Hasta aquí, nada nuevo. Lo interesante es lo que la IA le agrega. Antes, para sacar un dato distinto tenías que pedírselo al área de sistemas y esperar. Ahora hay dos cosas que cambian el juego.", "c": false}, {"t": "Preguntarle a los datos hablando, como a una persona", "c": false}, {"t": "Imagina que en vez de pedir un reporte, le escribes a tu sistema una pregunta tal como la dirías en voz alta: \"¿cuáles fueron las ventas del último trimestre?\" o \"¿qué región creció más este año?\". Y el sistema te entiende y te arma el gráfico solo. No hay que saber fórmulas ni programar: le hablas como le hablarías a un colega.", "c": false}, {"t": "Esto ya lo usaste: es lo mismo que le preguntas a ChatGPT o al asistente del teléfono. Aplicado a tus datos de ventas, a esto se le llama consulta en lenguaje natural (en inglés, NLQ).", "c": false}, {"t": "Que te escriban el resumen del gráfico, solo", "c": false}, {"t": "La segunda ayuda: la IA no solo te muestra el gráfico, también te escribe abajo, en palabras, lo que ese gráfico está diciendo. \"Las ventas subieron un 12% respecto al año pasado, con el mayor crecimiento entre junio y septiembre.\" Ese comentario que tú a veces tienes que redactar a mano para la jefatura, lo arma la máquina en un segundo. Y si cambias el filtro a otra región, el texto se reescribe solo. A esto se le llama narrativa inteligente .", "c": false}, {"t": "Ojo, eso sí: la máquina te destaca lo que salta a la vista, pero no reemplaza tu lectura. Decir \"las ventas cayeron\" es fácil; entender que cayeron porque cerró un cliente grande del norte, eso lo pones tú. La máquina apura la parte lateosa; el criterio sigue siendo tuyo.", "c": false}, {"t": "Etapa 2 — ¿Por qué pasó? (cazar la causa sin perderte)", "c": true}, {"t": "Saber qué pasó casi nunca alcanza. Si este trimestre se te fueron más afiliados de lo normal, el número te dice el tamaño del golpe, pero no la razón. Y sin la razón, no sabes qué arreglar. Ahí entra la segunda etapa: entender por qué pasó. En el curso, análisis diagnóstico .", "c": false}, {"t": "Tú ya haces esto de cabeza. Cuando algo se cae, empiezas a preguntarte: ¿es la competencia? ¿un problema de atención? ¿un segmento en particular? Lo que la IA hace es esa misma cacería, pero revisando cientos de posibles causas a la vez, sin que tú tengas que ir una por una.", "c": false}, {"t": "Qué es lo que más está pesando", "c": false}, {"t": "La primera herramienta te dice, de todos los factores posibles, cuáles son los que de verdad están moviendo la aguja. En vez de revisar a mano edad, renta, zona, antigüedad y reclamos uno por uno, la máquina te señala: \"mira, la fuga se concentra sobre todo en afiliados de menos de dos años y con un reclamo sin resolver\". A esa herramienta se le llama influenciadores clave : los factores que más impactan en lo que te importa.", "c": false}, {"t": "Ir desarmando el problema por capas", "c": false}, {"t": "La segunda herramienta te ayuda a ir más al fondo. Parte de lo general y te va sugiriendo dónde escarbar. La caída está en el norte… dentro del norte, en dos ciudades… dentro de esas ciudades, en un segmento de clientes jóvenes… y ahí está el origen. Es como ir abriendo cajones, y que alguien te diga cuál abrir para no perder tiempo. A esto se le llama árbol de descomposición , y sirve para encontrar la causa raíz : el origen real del problema, no el síntoma.", "c": false}, {"t": "Un aviso honesto: estas herramientas te muestran dónde mirar, no te entregan el veredicto firmado. Te dicen \"esto está muy relacionado con la fuga\", pero si es la causa de verdad o una casualidad, eso lo confirmas tú, que conoces el negocio.", "c": false}, {"t": "Etapa 3 — ¿Qué va a pasar? (anticiparte, como ya lo haces)", "c": true}, {"t": "Aquí viene la etapa que más suena, y también la que tú ya haces sin darte cuenta: anticipar. Ese afiliado que hace tres meses no contesta y bajó sus aportes… lo hueles, se va a ir. No lo sacaste de un manual: lo sabes porque viste cientos de casos iguales. La IA hace exactamente eso, con toda tu cartera a la vez. En el curso, análisis predictivo , y responde: ¿qué va a pasar?", "c": false}, {"t": "Ojo, no adivina el futuro con bola de cristal. Lo que hace es reducir la incertidumbre: en vez de esperar a que el cliente se vaya, te avisa antes, cuando todavía puedes hacer algo. Y las preguntas que responde son de dos tipos.", "c": false}, {"t": "¿Se va a traspasar o se queda?", "c": false}, {"t": "¿Este prospecto es bueno o no?", "c": false}, {"t": "¿Esta operación es normal o sospechosa?", "c": false}, {"t": "En el curso: clasificación.", "c": false}, {"t": "¿Cuánta pensión va a tener?", "c": false}, {"t": "¿Cuánto vamos a vender el próximo mes?", "c": false}, {"t": "¿Cuántos días va a demorar un trámite?", "c": false}, {"t": "En el curso: regresión.", "c": false}, {"t": "La diferencia es simple: clasificación es cuando la respuesta es una etiqueta (\"se va\" / \"se queda\"); regresión es cuando la respuesta es una cifra (\"$850.000 de pensión\"). Las dos usan tu historia para adivinar el futuro; solo cambia qué tipo de respuesta buscas.", "c": false}, {"t": "Cuando algo se sale de lo normal", "c": false}, {"t": "Hay un tercer tipo de anticipación muy útil: detectar lo que se sale del molde. Una sucursal que de un día para otro vende la mitad, un tiempo de espera que se dispara, un gasto que se triplica sin razón. La IA aprende cómo se ve \"lo normal\" en cada caso y te avisa cuando algo se desvía de verdad. A esto se le llama detección de anomalías .", "c": false}, {"t": "Lo bueno es que no usa un límite fijo y tonto (tipo \"avísame si pasa de 100\"), sino que entiende el ritmo propio de cada cosa. Así te ahorra falsas alarmas: no te molesta por el peak normal de fin de mes, pero sí te avisa por la caída rara de un martes cualquiera.", "c": false}, {"t": "La trampa del dato que no deberías tener", "c": true}, {"t": "Esta parte es corta, pero es de las más importantes de toda la unidad, porque es el error que hunde a los modelos que anticipan, y es facilísimo caer en él sin darte cuenta.", "c": false}, {"t": "Te lo explico con la trampa que es. Imagina que quieres predecir quién se va a traspasar, y para \"entrenar\" a la máquina le pasas, entre los datos, la fecha en que el afiliado firmó el traspaso. La máquina va a acertar el 100% de las veces… obvio, le estás dando la respuesta. Pero ese dato —la fecha de firma— solo existe cuando el cliente ya se fue. El día que de verdad necesitas anticipar, ese dato no está. La máquina que se veía perfecta en la prueba, en la cancha falla fea.", "c": false}, {"t": "Entrena con un dato que solo aparece DESPUÉS de lo que quieres predecir (la fecha de firma del traspaso). Se ve perfecto en la prueba, con aciertos espectaculares. Pero ese dato no existe cuando de verdad hay que anticipar, y en la realidad se cae.", "c": false}, {"t": "Entrena solo con datos que tendrías ANTES de que el cliente decida: su antigüedad, sus aportes, sus reclamos, sus llamadas. Acierta menos que el tramposo en la prueba, pero funciona de verdad el día que importa.", "c": false}, {"t": "A este error se le llama fuga del objetivo (en inglés, target leakage ). En simple: el modelo hace trampa sin querer, usando un dato que ya revela la respuesta. La regla de oro es preguntarte siempre: \"¿este dato lo iba a tener ANTES de que pasara lo que quiero predecir?\". Si la respuesta es no, ese dato queda fuera.", "c": false}, {"t": "Etapa 4 — ¿Qué hago? (la mejor jugada para cada cliente)", "c": true}, {"t": "Llegamos a la etapa más avanzada, y también a la más valiosa para alguien de ventas. Saber que un afiliado se va a ir (etapa 3) no sirve de nada si no sabes qué hacer con esa información. La pregunta final es: ¿qué hago? En el curso, análisis prescriptivo .", "c": false}, {"t": "Y aquí está la joya. No se trata de tratar a todos igual. Se trata de saber, para cada cliente, cuál es la jugada con más probabilidad de funcionar. A uno le sirve una llamada personal, a otro un beneficio, a otro que simplemente le resuelvan un reclamo que arrastra hace meses. Esa jugada a medida para cada caso tiene nombre: la siguiente mejor acción (en inglés, Next Best Action ).", "c": false}, {"t": "Esto ya lo tiene el buen vendedor", "c": false}, {"t": "Fíjate que esto es puro colmillo comercial. El vendedor con calle no le ofrece lo mismo a todos: lee a cada cliente y sabe qué mueve a cada uno. Lo que hace la IA es tener ese colmillo para miles de clientes a la vez, y afinarlo con cada resultado.", "c": false}, {"t": "Cómo aprende a decidir mejor: probando", "c": false}, {"t": "¿Y cómo aprende la máquina cuál es la mejor jugada? De la misma forma que aprendiste tú a vender: probando. Ofrece una cosa, mira si funcionó, y si funcionó, repite; si no, cambia. Con premios cuando acierta y \"castigos\" cuando falla, va afinando su estrategia sola, cliente a cliente. A esa forma de aprender —probando, con premios y castigos— se le llama aprendizaje por refuerzo . Es igualito a como aprendiste a manejar o a cerrar una venta: nadie te dio el manual perfecto, lo fuiste calibrando a punta de intentos.", "c": false}, {"t": "Todo junto: la empresa que dejó de perder clientes", "c": true}, {"t": "Juntemos las cuatro etapas en una historia real del curso, y verás que es tu mundo tal cual. Una empresa de telefonía estaba perdiendo clientes que se pasaban a la competencia —lo que tú vives como el traspaso de afiliados—. No sabían quién se iba, ni por qué, ni qué ofrecerle a cada uno. Así subieron la escalera completa:", "c": false}, {"t": "Miraron qué pasó (etapa 1). Sacaron los números: cuántos clientes se iban, de qué planes, en qué zonas. El reporte del pasado, para dimensionar el golpe.", "c": false}, {"t": "Entendieron por qué (etapa 2). Con las herramientas de causa raíz descubrieron qué factores pesaban más en la fuga: cierto tipo de contrato, cierta antigüedad, clientes con reclamos. Dejaron de adivinar.", "c": false}, {"t": "Anticiparon quién se iría (etapa 3). Entrenaron un modelo con su historia —cuidándose de no caer en la trampa del dato tramposo— para marcar, por adelantado, a los clientes con alto riesgo de irse.", "c": false}, {"t": "Decidieron la jugada para cada uno (etapa 4). En vez de la misma oferta para todos, un sistema que aprende probando le fue armando a cada cliente la mejor movida: a uno un descuento, a otro meses gratis, a otro un beneficio. Y con cada resultado, afinaba.", "c": false}, {"t": "¿El resultado? Aceptaron muchas más ofertas de retención que con la vieja campaña de \"lo mismo para todos\". Pero fíjate en lo más importante, porque es donde tú entras: el sistema no retuvo a nadie. Solo le dijo al equipo a quién priorizar y qué probar con cada uno. La llamada, la conversación, el gesto que de verdad convence al cliente de quedarse… eso siguió siendo humano. La máquina entrega la pista; el cierre lo haces tú.", "c": false}, {"t": "Y date cuenta de algo: la empresa no hizo nada que tú no hagas. Miró, entendió, anticipó y decidió. Solo lo hizo con miles de clientes a la vez. Ese es todo el viaje.", "c": false}, {"t": "Las palabras clave, en una línea", "c": true}, {"t": "No necesitas memorizarlas para entender la idea. Están aquí por si en el curso las nombran y quieres ubicarlas al toque.", "c": false}, {"t": "Análisis descriptivo", "c": false}, {"t": "Mirar el pasado: ¿qué pasó? (el reporte de siempre).", "c": false}, {"t": "Análisis diagnóstico", "c": false}, {"t": "Entender el porqué: ¿por qué pasó?", "c": false}, {"t": "Análisis predictivo", "c": false}, {"t": "Anticipar: ¿qué va a pasar?", "c": false}, {"t": "Análisis prescriptivo", "c": false}, {"t": "Decidir la jugada: ¿qué hago?", "c": false}, {"t": "Consulta en lenguaje natural (NLQ)", "c": false}, {"t": "Preguntarle a los datos hablando, como a ChatGPT, y que te arme el gráfico.", "c": false}, {"t": "Narrativa inteligente", "c": false}, {"t": "Que la IA te escriba, en palabras, lo que dice el gráfico.", "c": false}, {"t": "Influenciadores clave", "c": false}, {"t": "Los factores que más pesan en lo que te importa.", "c": false}, {"t": "Árbol de descomposición", "c": false}, {"t": "Ir desarmando el problema por capas hasta el origen.", "c": false}, {"t": "Causa raíz", "c": false}, {"t": "El origen real de un problema, no el síntoma.", "c": false}, {"t": "Clasificación", "c": false}, {"t": "Predecir una categoría (¿se va o se queda?).", "c": false}, {"t": "Regresión", "c": false}, {"t": "Predecir un número (¿cuánta pensión?).", "c": false}, {"t": "Detección de anomalías", "c": false}, {"t": "Avisar cuando algo se sale de lo normal.", "c": false}, {"t": "Fuga del objetivo (target leakage)", "c": false}, {"t": "Cuando el modelo hace trampa con un dato que revela la respuesta.", "c": false}, {"t": "Siguiente mejor acción (Next Best Action)", "c": false}, {"t": "La mejor jugada para cada cliente, no la misma para todos.", "c": false}, {"t": "Aprendizaje por refuerzo", "c": false}, {"t": "Aprender probando, con premios y castigos.", "c": false}, {"t": "Si te quedas con tres cosas, que sean estas", "c": true}, {"t": "Los datos hacen un viaje de cuatro etapas : qué pasó, por qué, qué viene, qué hago. Cada una se apoya en la anterior. Y tú ya lo recorres con cada cliente.", "c": false}, {"t": "La joya está al final: no tratar a todos igual, sino saber la mejor jugada para cada uno . Eso es puro colmillo comercial, ahora a gran escala.", "c": false}, {"t": "Desconfía de lo demasiado perfecto . Un modelo que acierta el 99% casi siempre está haciendo trampa con un dato que no debería tener.", "c": false}, {"t": "Lo interesante es que tú ya piensas así: miras, entiendes, anticipas y decides, con cada afiliado. La máquina solo hace eso mismo con miles a la vez, y te pasa la pista. El cierre —la llamada, la conversación que salva al cliente— sigue siendo tuyo. Por eso estás mejor preparada que muchos.", "c": false}];
const reader = document.getElementById('reader');
const pfill = document.getElementById('pfill');
const playBtn = document.getElementById('play');

// render
SEGS.forEach((s,i)=>{
  const d = document.createElement('p');
  d.className = 'seg' + (s.c ? ' chap':'');
  d.textContent = s.t;
  d.dataset.i = i;
  d.onclick = ()=>{ speakFrom(i); };
  reader.appendChild(d);
});
const nodes = [...document.querySelectorAll('.seg')];

let idx = 0, playing = false, rate = 1;
const synth = window.speechSynthesis;
let voices = [], chosenVoice = null;

function loadVoices(){
  voices = synth.getVoices().filter(v=>v.lang.toLowerCase().startsWith('es'));
  if(!voices.length) voices = synth.getVoices();
  const sel = document.getElementById('voice');
  sel.innerHTML='';
  voices.forEach((v,i)=>{
    const o=document.createElement('option');
    o.value=i; o.textContent=v.name.replace(/Microsoft |Google /,'')+' ('+v.lang+')';
    sel.appendChild(o);
  });
  // prefer a natural es voice
  let pref = voices.findIndex(v=>/es-MX|es-US|es-419/i.test(v.lang));
  if(pref<0) pref = voices.findIndex(v=>v.lang.toLowerCase().startsWith('es'));
  if(pref<0) pref=0;
  sel.value=pref; chosenVoice=voices[pref];
  sel.onchange=()=>{ chosenVoice=voices[sel.value]; if(playing){ synth.cancel(); speakFrom(idx);} };
}
loadVoices();
if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=loadVoices;

function highlight(i){
  nodes.forEach((n,k)=>{
    n.classList.toggle('active', k===i);
    n.classList.toggle('done', k<i);
  });
  pfill.style.width = ((i)/(SEGS.length-1)*100).toFixed(1)+'%';
  const el = nodes[i];
  const r = el.getBoundingClientRect();
  if(r.top < 90 || r.bottom > window.innerHeight-210){
    el.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function speakSeg(i){
  if(i>=SEGS.length){ stop(); pfill.style.width='100%'; return; }
  idx=i; highlight(i);
  const u = new SpeechSynthesisUtterance(SEGS[i].t);
  if(chosenVoice) u.voice=chosenVoice;
  u.lang = chosenVoice ? chosenVoice.lang : 'es-ES';
  u.rate = rate; u.pitch = 1;
  u.onend = ()=>{ if(playing) speakSeg(i+1); };
  synth.speak(u);
}
function speakFrom(i){ synth.cancel(); playing=true; playBtn.innerHTML='&#10074;&#10074;'; speakSeg(i); }
function stop(){ playing=false; synth.cancel(); playBtn.innerHTML='&#9658;'; }

playBtn.onclick=()=>{
  if(playing){ stop(); }
  else { speakFrom(idx); }
};
document.getElementById('next').onclick=()=>{ speakFrom(Math.min(idx+1,SEGS.length-1)); };
document.getElementById('prev').onclick=()=>{ speakFrom(Math.max(idx-1,0)); };

// speed
document.querySelectorAll('.spd button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.spd button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); rate=parseFloat(b.dataset.r);
    if(playing){ synth.cancel(); speakSeg(idx); }
  };
});

// chapters
const chapList=document.getElementById('chapList');
SEGS.forEach((s,i)=>{
  if(s.c){
    const d=document.createElement('div');
    d.className='chap-item';
    d.innerHTML='<span class="cn">&#9834;</span>'+s.t;
    d.onclick=()=>{ closeSheet(); speakFrom(i); };
    chapList.appendChild(d);
  }
});
const sheet=document.getElementById('sheet');
document.getElementById('chapBtn').onclick=()=>sheet.classList.add('open');
sheet.onclick=(e)=>{ if(e.target===sheet) closeSheet(); };
function closeSheet(){ sheet.classList.remove('open'); }

highlight(0);
</script>
</body>
</html>
