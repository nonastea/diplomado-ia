<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cómo probar una idea de IA antes de invertir en ella</title>
<style>
  :root{
    --bg:#FBFAF6; --card:#FFFFFF; --card2:#F1EEE5;
    --ink:#1C2723; --soft:#5C645E; --green:#0F8A6E; --green-deep:#0B6A55;
    --amber:#C2772C; --line:#E5E1D6; --hl:#DEF1EA; --done:#AEB6AF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Avenir Next','Avenir',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:18px;line-height:1.62;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #app{display:flex;flex-direction:column;height:100dvh;max-width:760px;margin:0 auto;background:var(--bg);}

  /* HEADER */
  header{padding:16px 20px 12px;border-bottom:1px solid var(--line);flex:0 0 auto;}
  .eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--green);margin:0 0 4px;}
  header h1{font-size:1.12rem;font-weight:800;margin:0;line-height:1.25;letter-spacing:-.2px;color:var(--ink);}

  /* TEXTO */
  #reader{flex:1 1 auto;overflow-y:auto;padding:18px 20px 210px;-webkit-overflow-scrolling:touch;}
  .seg{margin:0 0 14px;color:var(--soft);transition:color .25s,background .25s;padding:3px 10px;border-radius:9px;cursor:pointer;scroll-margin-top:20px;}
  .seg.chap{color:var(--ink);font-weight:800;font-size:1.2rem;margin:26px 0 12px;line-height:1.28;}
  .seg.active{color:var(--ink);background:var(--hl);}
  .seg.chap.active{background:var(--hl);}
  .seg.done{color:var(--done);}

  /* CONTROLES */
  .bar{
    position:fixed;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;
    background:linear-gradient(180deg,rgba(251,250,246,0) 0%,var(--bg) 24%);
    padding:14px 18px calc(16px + env(safe-area-inset-bottom));
  }
  .progress{height:5px;background:var(--card2);border-radius:4px;overflow:hidden;margin:0 2px 12px;}
  .progress i{display:block;height:100%;width:0;background:var(--green);transition:width .3s;}
  .ctrls{display:flex;align-items:center;justify-content:center;gap:14px;}
  button{font-family:inherit;color:var(--ink);border:none;background:var(--card);border-radius:14px;cursor:pointer;}
  .btn-skip{width:56px;height:56px;font-size:.78rem;font-weight:700;line-height:1.05;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:1px solid var(--line);color:var(--soft);}
  .btn-skip span{font-size:1.15rem;color:var(--ink);}
  .btn-play{width:74px;height:74px;border-radius:50%;background:var(--green);color:#fff;font-size:2rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(15,138,110,.30);border:none;}
  .btn-play:active{transform:scale(.94);}
  .row2{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;}
  .pill{background:var(--card);border-radius:12px;padding:9px 12px;font-size:.86rem;color:var(--soft);display:flex;align-items:center;gap:8px;font-weight:600;border:1px solid var(--line);}
  .pill b{color:var(--ink);}
  select{font-family:inherit;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:9px 12px;font-size:.86rem;font-weight:600;max-width:46vw;}
  .spd{display:flex;gap:6px;}
  .spd button{padding:8px 11px;font-size:.82rem;font-weight:700;background:var(--card);color:var(--soft);border-radius:10px;border:1px solid var(--line);}
  .spd button.on{background:var(--green);color:#fff;border-color:var(--green);}

  /* SHEET capitulos */
  #chapBtn{background:var(--card);border-radius:12px;padding:9px 14px;font-size:.86rem;font-weight:700;color:var(--ink);border:1px solid var(--line);}
  .sheet{position:fixed;inset:0;background:rgba(28,39,35,.45);display:none;z-index:20;}
  .sheet.open{display:block;}
  .sheet-inner{position:absolute;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;background:var(--card);border-radius:20px 20px 0 0;max-height:72dvh;overflow-y:auto;padding:10px 0 24px;box-shadow:0 -8px 30px rgba(28,39,35,.14);}
  .sheet-inner h3{margin:14px 22px;font-size:.78rem;text-transform:uppercase;letter-spacing:.6px;color:var(--soft);}
  .chap-item{padding:14px 22px;font-weight:600;border-top:1px solid var(--line);cursor:pointer;color:var(--ink);}
  .chap-item:active{background:var(--hl);}
  .chap-item .cn{color:var(--green);font-weight:800;margin-right:10px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <p class="eyebrow">Audiolibro · voz del dispositivo</p>
    <h1>Cómo probar una idea de IA antes de invertir en ella</h1>
  </header>
  <div id="reader"></div>
</div>

<div class="bar">
  <div class="progress"><i id="pfill"></i></div>
  <div class="ctrls">
    <button class="btn-skip" id="prev"><span>&#9664;</span>Anterior</button>
    <button class="btn-play" id="play">&#9658;</button>
    <button class="btn-skip" id="next">Siguiente<span>&#9654;</span></button>
  </div>
  <div class="row2">
    <button id="chapBtn">&#9776; Capítulos</button>
    <div class="spd">
      <button data-r="0.9">0.9&times;</button>
      <button data-r="1" class="on">1&times;</button>
      <button data-r="1.25">1.25&times;</button>
      <button data-r="1.5">1.5&times;</button>
    </div>
  </div>
  <div class="row2">
    <div class="pill">Voz</div>
    <select id="voice"></select>
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <h3>Capítulos</h3>
    <div id="chapList"></div>
  </div>
</div>

<script>
const SEGS = [{"t": "La inteligencia artificial, explicada desde el mundo comercial", "c": false}, {"t": "Cómo probar una idea de IA antes de invertir en ella", "c": true}, {"t": "Tu industria está llena de ideas de IA esperando turno: un sistema que diga a qué afiliado llamar primero, otro que detecte quién está por traspasarse, otro que arme recomendaciones para cada cliente. La pregunta cara es: ¿cuáles de esas ideas valen la pena de verdad ? Construirlas todas para averiguarlo costaría meses y una fortuna.", "c": false}, {"t": "Esta guía te explica el método inteligente para saberlo barato y rápido: el prototipo . Y aquí está lo bueno: ya lo haces en ventas sin darte cuenta. Antes de lanzar un guion nuevo a toda tu cartera, lo pruebas con unos pocos clientes para ver si pega.", "c": false}, {"t": "El recorrido", "c": true}, {"t": "1 La gran idea: probar barato antes de invertir caro", "c": false}, {"t": "2 Las dos preguntas que decide todo prototipo", "c": false}, {"t": "3 Las reglas del juego: rápido, claro y con meta", "c": false}, {"t": "4 La trampa de los datos \"maquillados\"", "c": false}, {"t": "5 La forma antigua de trabajar vs. la nueva", "c": false}, {"t": "6 Las tres capas que toda solución necesita", "c": false}, {"t": "7 No reinventes la rueda: herramientas listas", "c": false}, {"t": "8 Un caso completo: la tienda que recuperó sus ventas", "c": false}, {"t": "Probar barato antes de invertir caro", "c": true}, {"t": "En la guía pasada viste cómo aprende una IA por dentro. Ahora viene algo más práctico y, para tu rol, todavía más útil: cómo saber si una idea de IA vale la pena antes de construirla.", "c": false}, {"t": "Piénsalo desde lo que ya haces. Jamás lanzarías un guion nuevo a toda tu cartera un lunes en la mañana. Primero lo pruebas con cinco o diez clientes, miras cómo cae, ajustas lo que no funcionó, y recién ahí decides si vale la pena usarlo con todos. Es puro instinto comercial: no se invierte a ciegas.", "c": false}, {"t": "Eso, aplicado a una idea de IA, tiene un nombre: prototipo . Y la definición técnica es importante, porque no es lo que uno se imagina. Un prototipo no es \"una versión chica del sistema final\". Es un producto inacabado cuyo único propósito es validar : una prueba rápida, imperfecta y deliberadamente barata, hecha para responder una sola pregunta: ¿esto funciona o no?", "c": false}, {"t": "Por qué importa tanto: la incertidumbre y el \"pozo sin fondo\"", "c": false}, {"t": "El curso lo plantea así: el propósito de un prototipo es minimizar el riesgo de lo que llama la incertidumbre (en sus palabras, la \"increíble incertidumbre\") que rodea a los proyectos de IA. ¿Qué es la incertidumbre? La falta de previsibilidad sobre tres cosas clave: los requisitos , la aceptación del usuario y la calidad de los datos . En cristiano: al empezar no sabes si la idea va a servir, si la gente la va a usar, ni si los datos son lo bastante buenos. El prototipo despeja esas dudas barato y rápido.", "c": false}, {"t": "Y seguro conoces esa campaña que entusiasmó a todos, se comió presupuesto por meses, y al final no convirtió nada. En este curso le ponen nombre: el pozo sin fondo . Muchas empresas parten un proyecto de IA con todo el ánimo, gastan miles de dólares, y descubren medio año después que la solución simplemente no servía.", "c": false}, {"t": "El prototipo es la salida barata de ese pozo. Te permite llegar a la conclusión —\"esto sirve\" o \"esto no sirve\"— en dos semanas en vez de en seis meses. Eso es mejor retorno de la inversión (lo que en ventas conoces como ROI): gastas poquito para saber si valía la pena gastar mucho.", "c": false}, {"t": "Tres primos que vas a escuchar", "c": false}, {"t": "Vas a oír tres palabras que suenan parecido y conviene no confundirlas: prototipo, MVP (producto mínimo viable) y PoC (prueba de concepto). Son primos. El MVP es una primera versión funcional, mínima, que igual sale al mercado. La PoC prueba que algo técnicamente se puede hacer. El prototipo es el más rápido y barato de los tres: no busca ser un producto terminado, solo existe para validar y después se desecha.", "c": false}, {"t": "Las dos preguntas que decide todo prototipo", "c": true}, {"t": "Todo prototipo existe para responder dos preguntas. Y las vas a reconocer al toque, porque las sopesas en cada negocio que evalúas.", "c": false}, {"t": "¿La solución aporta valor real al usuario final?", "c": false}, {"t": "¿Se está utilizando de la manera en que fue prevista?", "c": false}, {"t": "¿La aceptan los usuarios dentro de su flujo de trabajo?", "c": false}, {"t": "En una línea: ¿lo quieren y lo van a usar ?", "c": false}, {"t": "¿Los datos contienen suficientes señales o patrones para construir un modelo realmente útil?", "c": false}, {"t": "¿Un servicio de IA ya hecho (preentrenado) funciona lo suficientemente bien con los datos específicos de la empresa?", "c": false}, {"t": "En una línea: ¿lo podemos hacer ?", "c": false}, {"t": "Las dos tienen que dar que sí. Una idea puede ser técnicamente perfecta y aun así fracasar porque a ningún cliente le interesa. Y al revés: una idea que todos quieren no sirve de nada si los datos no alcanzan para construirla. Por eso se validan las dos, no una sola.", "c": false}, {"t": "La frase más importante del curso", "c": false}, {"t": "Hay una idea que se repite una y otra vez, y conviene que se te grabe: \"crear un modelo preciso es bueno, pero crear un modelo útil es mejor.\" Un modelo preciso es un logro técnico. Un modelo útil es un logro de negocio. Puedes tener el sistema más sofisticado del mundo, pero si tu equipo no lo usa o ningún cliente lo aprovecha, no vale nada. La utilidad le gana siempre a la sofisticación.", "c": false}, {"t": "Las reglas del juego: rápido, claro y con meta", "c": true}, {"t": "Un prototipo sin reglas se transforma justo en el pozo sin fondo que venía a evitar. Tres reglas lo mantienen honesto y acotado.", "c": false}, {"t": "Objetivo claro. Plantéalo como una pregunta, no como un deseo vago. No \"exploremos la IA\", sino algo concreto y respondible: \"¿podemos construir algo que prediga quién se va a traspasar mejor que lo que usamos hoy?\". Una pregunta que se pueda contestar con sí o no.", "c": false}, {"t": "Plazos estrictos. De dos a cuatro semanas, máximo. A veces solo días. Es como un sprint de ventas: corto a propósito. El sentido del prototipo es aprender rápido; una prueba que se arrastra por meses ya fracasó en su misión.", "c": false}, {"t": "Criterios de aceptación. Define antes de empezar qué va a contar como éxito. \"El prototipo pasa si supera a la herramienta actual y si el grupo piloto muestra más interés.\" Esto se escribe el día uno, para que nadie discuta después si funcionó o no.", "c": false}, {"t": "Esa tercera regla es la que más se subestima. Sin un criterio de éxito puesto por escrito, lo que viene es una pelea de opiniones: marketing dirá que se ve lindo, tecnología dirá que la cifra no convence, y nadie tendrá razón porque nunca acordaron qué era ganar. El criterio claro zanja la discusión apuntando a la meta, no a los gustos.", "c": false}, {"t": "La trampa de los datos \"maquillados\"", "c": true}, {"t": "Esta es la regla más importante sobre los datos, y la vas a entender al instante porque es un autoengaño clásico de las ventas.", "c": false}, {"t": "La trampa: pruebas un guion nuevo solo con tus clientes más calientes, los de siempre, los que ya te quieren. Y claro, funciona de maravilla. Entonces lo lanzas a toda la cartera… y se cae, porque un cliente frío no se parece en nada a tus consentidos. Te engañaste solo con una muestra que no era real.", "c": false}, {"t": "Con los datos pasa exactamente igual. Si \"arreglas\" los datos a mano para que la prueba se vea bien —rellenando los huecos, sacando los casos feos, ordenando lo que en la vida real está desordenado— estás probando sobre una fantasía. Porque el día que esto opere de verdad, esa limpieza manual no va a ocurrir.", "c": false}, {"t": "El curso le pone nombre a esto: el realismo de datos . Y la regla de oro es no \"comprometerse\" con los datos : usar únicamente la información que tendrías de verdad en la operación real, sin limpiezas manuales que después no se puedan repetir.", "c": false}, {"t": "¿Por qué esta es la regla, por encima de todas? Por una razón de fondo muy simple: el modelo y la interfaz se pueden arreglar después. Los datos, no. Si tus datos no sirven, no hay modelo que los salve. Lo demás se corrige; los datos malos te hunden el proyecto entero.", "c": false}, {"t": "La forma antigua de trabajar vs. la nueva", "c": true}, {"t": "Existen dos grandes maneras de llevar un proyecto. Has vivido las dos, aunque no las hayas llamado por su nombre.", "c": false}, {"t": "Se planea todo al inicio, se congela el plan y se ejecuta paso a paso: recopilación de requisitos → diseño → implementación → verificación → mantenimiento. Una fase no parte hasta que la anterior esté completada y aprobada. Es como un plan anual rígido que no se puede tocar. Asume que todo se puede predecir desde el día uno.", "c": false}, {"t": "Avanza en ciclos cortos de dos a cuatro semanas (los famosos \"sprints\"): construyes un poco, lo pruebas con clientes reales, aprendes, ajustas y repites. Se adapta a lo que va apareciendo en el camino, en vez de aferrarse a un plan inicial.", "c": false}, {"t": "La metodología en cascada (en inglés, waterfall ) funcionó por décadas para sistemas predecibles. Pero con la IA se rompe, y por una razón puntual: en la IA no puedes saber de antemano si los datos van a servir o si el modelo será lo bastante bueno. Si congelas los requisitos al inicio y descubres meses después que los datos no eran los adecuados, volver atrás cuesta una fortuna. El feedback tardío es el mayor riesgo : el cliente solo ve el resultado al final, cuando ya es carísimo cambiarlo.", "c": false}, {"t": "La metodología ágil (en inglés, agile ) le da vuelta el problema, y aquí aparece el corazón de toda la unidad: la mentalidad de \"fallar rápido y barato\" . Sus ventajas, en tu idioma:", "c": false}, {"t": "Validas temprano. En iteraciones de dos a cuatro semanas confirmas si la idea funciona con tus propios datos, antes de escalar.", "c": false}, {"t": "Fallas rápido y barato. Si la idea no sirve, lo descubres en días, no en meses, minimizando la plata perdida.", "c": false}, {"t": "Pivoteas sin reiniciar. Cuando aparece un hallazgo nuevo a mitad de camino, cambias el rumbo sin botar todo el proyecto.", "c": false}, {"t": "Escuchas al cliente todo el tiempo. La única forma de saber si algo es útil es ponerlo frente a usuarios reales seguido, no una sola vez al final.", "c": false}, {"t": "Las tres capas que toda solución necesita", "c": true}, {"t": "Cualquier solución de IA —y cualquier prototipo de una— necesita tres capas. Y lo bonito es que responden a tres preguntas que tú le harías a cualquier campaña.", "c": false}, {"t": "Capa de datos — ¿DÓNDE está la información? El lugar donde se guarda y se carga la data: tablas ordenadas, pero también imágenes, documentos, audios o textos. Tiene que poder crecer con flexibilidad y dejarte acceder rápido para ir probando.", "c": false}, {"t": "Capa de análisis — ¿DÓNDE se construye el modelo? La sala de máquinas: donde se arman los experimentos, se entrenan los modelos y se evalúan los resultados. Es el cerebro del asunto.", "c": false}, {"t": "Capa de usuario — ¿CÓMO llega el resultado a quien decide? La interfaz que traduce las predicciones técnicas en algo que una persona puede mirar y con lo que puede actuar. La cara visible.", "c": false}, {"t": "Cubrir las tres capas de punta a punta —desde donde están los datos hasta lo que ve el usuario— tiene nombre en el curso: integración vertical profunda . La clave es hacerlo entero pero con baja complejidad técnica general : no construyes algo robusto y definitivo, solo lo justo para validar.", "c": false}, {"t": "Esa tercera capa es la que más se olvida, y para ti es la más importante. Un prototipo solo cumple su función cuando alguien puede mirarlo y decidir con él. Un análisis brillante que nunca llega al piso de ventas es como un prospecto caliente que nadie llama: no sirve de nada. La predicción tiene que aterrizar en manos de quien toma la decisión.", "c": false}, {"t": "Un cuidado: no trabajes en una isla", "c": false}, {"t": "Una advertencia técnica que conviene conocer: evita el prototipado en isla , es decir, construir la prueba en un computador aislado que no se conecta con nada. Si la idea funciona, vas a querer moverla a producción sin dramas. Por eso se usan herramientas como los contenedores (la más conocida se llama Docker ): permiten cargar todo el montaje de un lado a otro sin que se rompa en el camino.", "c": false}, {"t": "No reinventes la rueda: herramientas listas para usar", "c": true}, {"t": "Una excelente noticia para la etapa de prueba: no tienes que construir nada desde cero. Existen herramientas listas para enchufar que te permiten ir rápido y barato. Tres que vas a escuchar nombrar:", "c": false}, {"t": "AutoML", "c": false}, {"t": "La máquina prueba sola decenas de modelos y se queda con el mejor. Es como tener un asistente que ensaya diez enfoques distintos durante la noche y en la mañana te entrega el ganador. Sirve para las dos preguntas de la guía pasada (predecir un número o predecir una categoría) y, lo mejor, permite que hasta perfiles sin experiencia técnica armen un primer prototipo.", "c": false}, {"t": "IA como Servicio (AIaaS)", "c": false}, {"t": "Servicios de IA ya hechos, accesibles para tareas básicas: leer el texto de una foto, reconocer lo que dice un mensaje escrito. Te conectas y funcionan, sin que tengas que entrenar nada. En inglés se le dice AI as a Service : IA \"de góndola\", lista para comprar y usar.", "c": false}, {"t": "Modelos preentrenados", "c": false}, {"t": "Modelos que alguien ya entrenó y que tú solo adaptas a tu caso, en vez de partir de la nada. Te ahorras el trabajo pesado y aprovechas algo que ya aprendió.", "c": false}, {"t": "Y la regla de esta etapa es clarísima: nunca entrenes un sistema desde cero para una simple validación. Es caro y lento. Usa lo que ya está listo. Recién cuando la idea demuestre que vale la pena, se justifica construir algo a medida.", "c": false}, {"t": "Un detalle para que no te asuste el vocabulario: existen varios \"kits\" que ofrecen estas piezas —los de Amazon, Google y Microsoft, además de opciones abiertas y gratuitas—. Todos hacen lo mismo: cubren las tres capas. Cuál elegir depende de lo que tu empresa ya usa, del presupuesto y de la experiencia del equipo. Para entender el concepto, el nombre de la marca da lo mismo.", "c": false}, {"t": "Un caso completo: la tienda que recuperó sus ventas", "c": true}, {"t": "Juntemos todo con una historia muy cercana a la tuya, porque es de ventas, conversión y un piloto. Es un caso real del curso: Comercial Luma , una tienda online chilena.", "c": false}, {"t": "El problema: muchísimos clientes entran al sitio, miran productos y se van sin comprar. El equivalente digital del prospecto que corta antes de que cierres. El equipo sospecha que la página es demasiado genérica: le muestra \"los más vendidos de la semana\" a todo el mundo, sin considerar lo que cada persona vio o compró antes.", "c": false}, {"t": "La idea: un sistema de recomendaciones con IA, personalizado para cada cliente. Pero antes de invertir en la solución completa, el equipo de datos propone construir un prototipo. Mira cómo aplican, paso a paso, todo lo que acabas de leer.", "c": false}, {"t": "Pusieron a alguien a cargo y acotaron el alcance. Valentina Rojas, analista de inteligencia de negocios, coordina con marketing y tecnología. Su primera decisión: no construir la plataforma definitiva, sino un prototipo funcional en dos semanas , solo para validar.", "c": false}, {"t": "Definieron la pregunta concreta. El objetivo claro: \"¿los datos de navegación y compra permiten generar recomendaciones más útiles que el sistema actual de productos populares?\". Una pregunta que se responde con sí o no.", "c": false}, {"t": "Juntaron una muestra representativa de datos reales. Historial de clics, productos vistos, frecuencia de compra, categorías, compras anteriores. Los cargaron tal cual, sin limpiezas manuales excesivas que después no se pudieran repetir en la operación real (el realismo de datos de la Parte 4).", "c": false}, {"t": "Enfrentaron tres problemas con honestidad. Datos de navegación incompletos en algunos períodos; marketing esperando resultados rápidos pero sin criterio claro de éxito; y tecnología advirtiendo que no convenía una arquitectura compleja sin saber aún si la idea funcionaría. Más la tensión clásica: marketing quería una interfaz bonita, tecnología quería validar lo técnico. Valentina los ordenó recordando que un prototipo no es el producto final: su trabajo es dar evidencia temprana.", "c": false}, {"t": "Fijaron criterios de aceptación claros. Éxito = el modelo supera a la recomendación de más vendidos, y el grupo piloto muestra más interés en las sugerencias personalizadas, y los datos se pueden obtener igual en la operación real.", "c": false}, {"t": "Armaron las tres capas. Datos: una muestra de compras y categorías. Análisis: una herramienta de AutoML para probar varios modelos y compararlos con la línea base actual. Usuario: una interfaz simple para ver las recomendaciones de un grupo reducido de clientes.", "c": false}, {"t": "Hicieron la prueba de fuego. Al grupo piloto le mostraron dos listas: una de productos populares y una personalizada por el prototipo. Compararon clics, productos guardados y comentarios. Aunque el modelo no era perfecto, las recomendaciones personalizadas lograron más interacción que el método tradicional.", "c": false}, {"t": "Lo que Valentina le dijo a la gerencia es la lección de toda la unidad: el prototipo no se juzga por lo sofisticado que es, sino por su capacidad de validar impacto y viabilidad. Mostró señales positivas en los datos, generó más interés en los usuarios y dejó ver qué mejoras hacían falta, todo antes de escalar.", "c": false}, {"t": "Fíjate en lo importante: Comercial Luma no eligió la tecnología más avanzada ni construyó la solución definitiva. Probó una idea con datos reales, clientes concretos y criterios claros, y recién entonces decidió si valía la pena invertir en grande. Eso es, palabra por palabra, lo que acabas de aprender.", "c": false}, {"t": "Las palabras clave, en una línea", "c": true}, {"t": "Prototipo", "c": false}, {"t": "Una prueba rápida y barata cuyo único fin es validar una idea, no ser un producto terminado.", "c": false}, {"t": "Validación", "c": false}, {"t": "Comprobar si una idea sirve antes de invertir en construirla.", "c": false}, {"t": "Incertidumbre", "c": false}, {"t": "La falta de previsibilidad sobre los requisitos, la aceptación del usuario y la calidad de los datos.", "c": false}, {"t": "Impacto", "c": false}, {"t": "Si la solución de verdad aporta valor y la gente la usa (la pregunta de negocio).", "c": false}, {"t": "Viabilidad", "c": false}, {"t": "Si se puede construir de verdad con los datos y herramientas que hay (la pregunta técnica).", "c": false}, {"t": "MVP", "c": false}, {"t": "Producto mínimo viable: una primera versión funcional y mínima para ver si la idea se sostiene.", "c": false}, {"t": "PoC", "c": false}, {"t": "Prueba de concepto: una prueba puntual de que algo técnicamente se puede hacer.", "c": false}, {"t": "ROI", "c": false}, {"t": "Retorno de la inversión: cuánto valor te devuelve lo que gastaste.", "c": false}, {"t": "Pozo sin fondo", "c": false}, {"t": "Un proyecto que se come recursos sin entregar resultados.", "c": false}, {"t": "Realismo de datos", "c": false}, {"t": "Usar solo los datos que tendrías en la operación real, sin maquillarlos a mano.", "c": false}, {"t": "Metodología en cascada", "c": false}, {"t": "Planear todo al inicio y ejecutar paso a paso, sin volver atrás.", "c": false}, {"t": "Metodología ágil", "c": false}, {"t": "Avanzar en ciclos cortos (sprints), probando y ajustando sobre la marcha.", "c": false}, {"t": "Fallar rápido y barato", "c": false}, {"t": "Descubrir pronto y con poca plata que una idea no sirve.", "c": false}, {"t": "AutoML", "c": false}, {"t": "Herramienta que prueba muchos modelos sola y se queda con el mejor.", "c": false}, {"t": "IA como Servicio (AIaaS)", "c": false}, {"t": "Servicios de IA listos para enchufar, para tareas básicas.", "c": false}, {"t": "Modelos preentrenados", "c": false}, {"t": "Modelos ya entrenados que solo adaptas a tu caso, sin partir de cero.", "c": false}, {"t": "Integración vertical profunda", "c": false}, {"t": "Que el prototipo cubra todas las capas, de los datos a la interfaz, con baja complejidad técnica.", "c": false}, {"t": "Las tres capas", "c": false}, {"t": "Datos (dónde está la info), análisis (dónde se arma el modelo) y usuario (cómo llega a quien decide).", "c": false}, {"t": "Si te quedas con tres cosas, que sean estas", "c": true}, {"t": "Prueba antes de invertir. Un prototipo barato te dice en dos semanas si una idea sirve, antes de gastar meses y una fortuna. Tú ya lo haces: pruebas un guion con pocos clientes antes de lanzarlo a toda la cartera.", "c": false}, {"t": "Útil le gana a sofisticado. El sistema más avanzado no sirve de nada si nadie lo usa o ningún cliente lo quiere. Valida primero que aporte valor de verdad.", "c": false}, {"t": "Usa datos reales , no maquillados. El modelo se arregla; los datos malos, no. Prueba con la información tal como es, defectos incluidos.", "c": false}, {"t": "Y lo más lindo: esto no es tecnología, es criterio comercial. Tú ya sabes que no se invierte a ciegas, que se prueba en chico antes de ir en grande. La IA solo le puso nombre técnico a algo que tú haces todos los días.", "c": false}];
const reader = document.getElementById('reader');
const pfill = document.getElementById('pfill');
const playBtn = document.getElementById('play');

// render
SEGS.forEach((s,i)=>{
  const d = document.createElement('p');
  d.className = 'seg' + (s.c ? ' chap':'');
  d.textContent = s.t;
  d.dataset.i = i;
  d.onclick = ()=>{ speakFrom(i); };
  reader.appendChild(d);
});
const nodes = [...document.querySelectorAll('.seg')];

let idx = 0, playing = false, rate = 1;
const synth = window.speechSynthesis;
let voices = [], chosenVoice = null;

function loadVoices(){
  voices = synth.getVoices().filter(v=>v.lang.toLowerCase().startsWith('es'));
  if(!voices.length) voices = synth.getVoices();
  const sel = document.getElementById('voice');
  sel.innerHTML='';
  voices.forEach((v,i)=>{
    const o=document.createElement('option');
    o.value=i; o.textContent=v.name.replace(/Microsoft |Google /,'')+' ('+v.lang+')';
    sel.appendChild(o);
  });
  // prefer a natural es voice
  let pref = voices.findIndex(v=>/es-MX|es-US|es-419/i.test(v.lang));
  if(pref<0) pref = voices.findIndex(v=>v.lang.toLowerCase().startsWith('es'));
  if(pref<0) pref=0;
  sel.value=pref; chosenVoice=voices[pref];
  sel.onchange=()=>{ chosenVoice=voices[sel.value]; if(playing){ synth.cancel(); speakFrom(idx);} };
}
loadVoices();
if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=loadVoices;

function highlight(i){
  nodes.forEach((n,k)=>{
    n.classList.toggle('active', k===i);
    n.classList.toggle('done', k<i);
  });
  pfill.style.width = ((i)/(SEGS.length-1)*100).toFixed(1)+'%';
  const el = nodes[i];
  const r = el.getBoundingClientRect();
  if(r.top < 90 || r.bottom > window.innerHeight-210){
    el.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function speakSeg(i){
  if(i>=SEGS.length){ stop(); pfill.style.width='100%'; return; }
  idx=i; highlight(i);
  const u = new SpeechSynthesisUtterance(SEGS[i].t);
  if(chosenVoice) u.voice=chosenVoice;
  u.lang = chosenVoice ? chosenVoice.lang : 'es-ES';
  u.rate = rate; u.pitch = 1;
  u.onend = ()=>{ if(playing) speakSeg(i+1); };
  synth.speak(u);
}
function speakFrom(i){ synth.cancel(); playing=true; playBtn.innerHTML='&#10074;&#10074;'; speakSeg(i); }
function stop(){ playing=false; synth.cancel(); playBtn.innerHTML='&#9658;'; }

playBtn.onclick=()=>{
  if(playing){ stop(); }
  else { speakFrom(idx); }
};
document.getElementById('next').onclick=()=>{ speakFrom(Math.min(idx+1,SEGS.length-1)); };
document.getElementById('prev').onclick=()=>{ speakFrom(Math.max(idx-1,0)); };

// speed
document.querySelectorAll('.spd button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.spd button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); rate=parseFloat(b.dataset.r);
    if(playing){ synth.cancel(); speakSeg(idx); }
  };
});

// chapters
const chapList=document.getElementById('chapList');
SEGS.forEach((s,i)=>{
  if(s.c){
    const d=document.createElement('div');
    d.className='chap-item';
    d.innerHTML='<span class="cn">&#9834;</span>'+s.t;
    d.onclick=()=>{ closeSheet(); speakFrom(i); };
    chapList.appendChild(d);
  }
});
const sheet=document.getElementById('sheet');
document.getElementById('chapBtn').onclick=()=>sheet.classList.add('open');
sheet.onclick=(e)=>{ if(e.target===sheet) closeSheet(); };
function closeSheet(){ sheet.classList.remove('open'); }

highlight(0);
</script>
</body>
</html>
