<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Del BI a la inteligencia: viabilidad de los proyectos de IA</title>
<style>
  :root{
    --bg:#FBFAF6; --card:#FFFFFF; --card2:#F1EEE5;
    --ink:#1C2723; --soft:#5C645E; --green:#0F8A6E; --green-deep:#0B6A55;
    --amber:#C2772C; --line:#E5E1D6; --hl:#DEF1EA; --done:#AEB6AF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Avenir Next','Avenir',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:18px;line-height:1.62;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #app{display:flex;flex-direction:column;height:100dvh;max-width:760px;margin:0 auto;background:var(--bg);}

  /* HEADER */
  header{padding:16px 20px 12px;border-bottom:1px solid var(--line);flex:0 0 auto;}
  .eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--green);margin:0 0 4px;}
  header h1{font-size:1.12rem;font-weight:800;margin:0;line-height:1.25;letter-spacing:-.2px;color:var(--ink);}

  /* TEXTO */
  #reader{flex:1 1 auto;overflow-y:auto;padding:18px 20px 210px;-webkit-overflow-scrolling:touch;}
  .seg{margin:0 0 14px;color:var(--soft);transition:color .25s,background .25s;padding:3px 10px;border-radius:9px;cursor:pointer;scroll-margin-top:20px;}
  .seg.chap{color:var(--ink);font-weight:800;font-size:1.2rem;margin:26px 0 12px;line-height:1.28;}
  .seg.active{color:var(--ink);background:var(--hl);}
  .seg.chap.active{background:var(--hl);}
  .seg.done{color:var(--done);}

  /* CONTROLES */
  .bar{
    position:fixed;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;
    background:linear-gradient(180deg,rgba(251,250,246,0) 0%,var(--bg) 24%);
    padding:14px 18px calc(16px + env(safe-area-inset-bottom));
  }
  .progress{height:5px;background:var(--card2);border-radius:4px;overflow:hidden;margin:0 2px 12px;}
  .progress i{display:block;height:100%;width:0;background:var(--green);transition:width .3s;}
  .ctrls{display:flex;align-items:center;justify-content:center;gap:14px;}
  button{font-family:inherit;color:var(--ink);border:none;background:var(--card);border-radius:14px;cursor:pointer;}
  .btn-skip{width:56px;height:56px;font-size:.78rem;font-weight:700;line-height:1.05;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:1px solid var(--line);color:var(--soft);}
  .btn-skip span{font-size:1.15rem;color:var(--ink);}
  .btn-play{width:74px;height:74px;border-radius:50%;background:var(--green);color:#fff;font-size:2rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(15,138,110,.30);border:none;}
  .btn-play:active{transform:scale(.94);}
  .row2{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;}
  .pill{background:var(--card);border-radius:12px;padding:9px 12px;font-size:.86rem;color:var(--soft);display:flex;align-items:center;gap:8px;font-weight:600;border:1px solid var(--line);}
  .pill b{color:var(--ink);}
  select{font-family:inherit;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:9px 12px;font-size:.86rem;font-weight:600;max-width:46vw;}
  .spd{display:flex;gap:6px;}
  .spd button{padding:8px 11px;font-size:.82rem;font-weight:700;background:var(--card);color:var(--soft);border-radius:10px;border:1px solid var(--line);}
  .spd button.on{background:var(--green);color:#fff;border-color:var(--green);}

  /* SHEET capitulos */
  #chapBtn{background:var(--card);border-radius:12px;padding:9px 14px;font-size:.86rem;font-weight:700;color:var(--ink);border:1px solid var(--line);}
  .sheet{position:fixed;inset:0;background:rgba(28,39,35,.45);display:none;z-index:20;}
  .sheet.open{display:block;}
  .sheet-inner{position:absolute;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;background:var(--card);border-radius:20px 20px 0 0;max-height:72dvh;overflow-y:auto;padding:10px 0 24px;box-shadow:0 -8px 30px rgba(28,39,35,.14);}
  .sheet-inner h3{margin:14px 22px;font-size:.78rem;text-transform:uppercase;letter-spacing:.6px;color:var(--soft);}
  .chap-item{padding:14px 22px;font-weight:600;border-top:1px solid var(--line);cursor:pointer;color:var(--ink);}
  .chap-item:active{background:var(--hl);}
  .chap-item .cn{color:var(--green);font-weight:800;margin-right:10px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <p class="eyebrow">Audiolibro &middot; Unidad 2 &middot; voz del dispositivo</p>
    <h1>Del BI a la inteligencia: viabilidad de los proyectos de IA</h1>
  </header>
  <div id="reader"></div>
</div>

<div class="bar">
  <div class="progress"><i id="pfill"></i></div>
  <div class="ctrls">
    <button class="btn-skip" id="prev"><span>&#9664;</span>Anterior</button>
    <button class="btn-play" id="play">&#9658;</button>
    <button class="btn-skip" id="next">Siguiente<span>&#9654;</span></button>
  </div>
  <div class="row2">
    <button id="chapBtn">&#9776; Capitulos</button>
    <div class="spd">
      <button data-r="0.9">0.9&times;</button>
      <button data-r="1" class="on">1&times;</button>
      <button data-r="1.25">1.25&times;</button>
      <button data-r="1.5">1.5&times;</button>
    </div>
  </div>
  <div class="row2">
    <div class="pill">Voz</div>
    <select id="voice"></select>
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <h3>Capitulos</h3>
    <div id="chapList"></div>
  </div>
</div>

<script>
const SEGS = [{"t": "Bienvenido al audiolibro de la Unidad 2, del Diplomado de Toma de decisiones basadas en datos con inteligencia artificial.", "c": false}, {"t": "El tema de hoy es el paso del Business Intelligence a la inteligencia para decidir, y sobre todo, cómo evaluar la viabilidad de un proyecto de inteligencia artificial.", "c": false}, {"t": "La Unidad 1 te enseñó a identificar dónde la inteligencia artificial crea valor para el negocio. Esta unidad te enseña a filtrar esas ideas y quedarte solo con las que de verdad se pueden ejecutar.", "c": false}, {"t": "La pregunta central no es cómo construir un modelo, sino una decisión anterior y más estratégica: ¿vale la pena construirlo?", "c": false}, {"t": "Para responderla, vamos a encadenar seis herramientas: las cuatro uves de los datos, el marco Crisp D M, la decisión de fabricar o comprar tecnología, las tres capas de arquitectura, los criterios éticos y, al final, una hoja de ruta priorizada.", "c": false}, {"t": "Relájate y escucha. Vamos por partes, con calma, un concepto a la vez.", "c": false}, {"t": "Capítulo 1. Del Business Intelligence a la inteligencia para decidir", "c": true}, {"t": "Empecemos por el título de la unidad, porque marca un salto conceptual importante.", "c": false}, {"t": "El Business Intelligence, o inteligencia de negocios, es la disciplina clásica de mirar el pasado.", "c": false}, {"t": "Funciona así: defines una métrica, construyes un modelo de datos, que es un esquema que organiza tablas y relaciones, y luego generas reportes o tableros que describen lo que ya ocurrió.", "c": false}, {"t": "La inteligencia artificial aplicada a decisiones da un paso más. No solo describe el pasado: aprende patrones para predecir o recomendar acciones futuras.", "c": false}, {"t": "La diferencia práctica está en el grado de incertidumbre.", "c": false}, {"t": "En Business Intelligence el proceso es predecible. Si tienes las ventas por mes, sabes de antemano que vas a poder graficarlas.", "c": false}, {"t": "En inteligencia artificial no puedes saber por adelantado si el modelo será capaz de aprender patrones útiles. Eso solo se descubre probándolo con datos reales.", "c": false}, {"t": "Dicho de otro modo: un proyecto de Business Intelligence casi siempre funciona, porque produce el reporte.", "c": false}, {"t": "Un proyecto de inteligencia artificial puede fracasar aunque esté perfectamente programado, simplemente porque los datos no contenían la señal necesaria.", "c": false}, {"t": "Te dejo una analogía para que quede grabado. El Business Intelligence es como leer el velocímetro y el cuentakilómetros de un auto. Te dicen con certeza a qué velocidad vas y cuánto has recorrido.", "c": false}, {"t": "La inteligencia artificial, en cambio, es como intentar predecir a qué hora vas a llegar. Depende de patrones como el tráfico, el clima o tu forma de manejar, que hay que aprender de viajes anteriores. Y a veces el patrón simplemente no está en los datos que registraste.", "c": false}, {"t": "¿Para qué nos sirve todo esto? Para actuar con criterio estratégico y evitar dos errores caros.", "c": false}, {"t": "El primer error es lanzarse a un proyecto ignorando la calidad de los datos, la capacidad técnica o los costos ocultos de infraestructura.", "c": false}, {"t": "El segundo error es el opuesto: quedarse paralizado, sin distinguir qué iniciativas dan resultados rápidos y cuáles exigen más investigación.", "c": false}, {"t": "La meta es priorizar con expectativas realistas, equilibrando impacto, viabilidad y responsabilidad organizacional.", "c": false}, {"t": "Capítulo 2. Los datos primero: las preguntas que van antes del algoritmo", "c": true}, {"t": "Ahora que entendemos el salto del Business Intelligence a la inteligencia, veamos la primera regla de la unidad. Es contraintuitiva para quien viene de la ingeniería.", "c": false}, {"t": "En las etapas iniciales, lo importante no es la arquitectura ni el algoritmo. Lo importante es el objetivo del caso de uso y la disponibilidad de datos.", "c": false}, {"t": "Muchas iniciativas fracasan, y presta atención, no por falta de tecnología, sino porque los datos son insuficientes, inconsistentes o simplemente no existen.", "c": false}, {"t": "Antes de discutir bases de datos o modelos, hay que definir con claridad el objetivo.", "c": false}, {"t": "El curso da un ejemplo que va a reaparecer toda la unidad. Dice así:", "c": false}, {"t": "Queremos utilizar datos históricos del sistema de gestión de clientes y del sistema de gestión empresarial para predecir qué clientes tienen riesgo de abandonar el servicio durante el próximo mes.", "c": false}, {"t": "Un pequeño paréntesis con dos siglas que vas a escuchar mucho. El sistema de gestión de clientes es lo que en inglés se llama C R M, que gestiona la relación y el historial con cada cliente.", "c": false}, {"t": "Y el sistema de gestión empresarial es lo que en inglés se llama E R P, que integra procesos como finanzas, inventario y operaciones.", "c": false}, {"t": "Esa sola frase del objetivo ya permite evaluar si el proyecto tiene fundamentos sólidos, porque de ella surgen las preguntas fundamentales de todo proyecto de inteligencia artificial.", "c": false}, {"t": "Primera pregunta: ¿qué datos se necesitan exactamente?", "c": false}, {"t": "Segunda: ¿están disponibles?", "c": false}, {"t": "Tercera: ¿quién tiene el permiso legal y técnico para acceder a ellos?", "c": false}, {"t": "Cuarta: ¿la empresa es propietaria de esos datos o debe adquirirlos?", "c": false}, {"t": "Y quinta: ¿existen registros históricos suficientes para entrenar un modelo?", "c": false}, {"t": "La conclusión es afilada. Si estas preguntas no pueden responderse con claridad, probablemente el problema principal todavía no sea construir un modelo de inteligencia artificial.", "c": false}, {"t": "El problema real, en ese caso, es mejorar la disponibilidad y la gobernanza de los datos. A veces el proyecto de inteligencia artificial correcto es, en realidad, un proyecto previo de datos.", "c": false}, {"t": "La gobernanza de datos es el conjunto de reglas y procesos que aseguran que los datos estén disponibles, consistentes y sean confiables.", "c": false}, {"t": "Un ejemplo concreto. Un banco quiere predecir la fuga de clientes, pero descubre que los motivos de cierre de cuenta se anotan a mano, en un campo de texto libre, sin estandarizar.", "c": false}, {"t": "Y peor: solo el treinta por ciento de los registros tiene ese campo lleno.", "c": false}, {"t": "No hay modelo de inteligencia artificial que arregle eso. Primero hay que resolver la gobernanza: definir el campo, hacerlo obligatorio y poblar el histórico.", "c": false}, {"t": "Capítulo 3. Crisp D M: el marco que ordena el proceso", "c": true}, {"t": "Ya sabemos que los datos van primero. Ahora necesitamos un mapa para ordenar el proceso completo. Ese mapa se llama Crisp D M.", "c": false}, {"t": "Crisp D M son las siglas en inglés de Proceso Estándar Intersectorial para la Minería de Datos. Es la metodología más adoptada para estructurar proyectos de ciencia de datos y minería de datos.", "c": false}, {"t": "El curso lo define como un proceso estándar intersectorial que propone ciclos de iteración cortos entre la comprensión del negocio y la comprensión de los datos.", "c": false}, {"t": "¿Por qué existe? Porque los proyectos de inteligencia artificial, por su incertidumbre, no avanzan en línea recta.", "c": false}, {"t": "Crisp D M nace para dar un esqueleto iterativo y ágil.", "c": false}, {"t": "En lugar de decir: primero entiendo todo el negocio, luego todos los datos y luego el modelo, propone ciclos cortos donde la comprensión del negocio y la de los datos avanzan al mismo tiempo y se retroalimentan.", "c": false}, {"t": "Antes de pensar en algoritmos, herramientas o infraestructura, la organización debe preguntarse si los datos realmente contienen las señales necesarias para resolver el problema.", "c": false}, {"t": "La primera figura del curso, tomada de I B M, muestra esto como un círculo, no como una escalera.", "c": false}, {"t": "En el centro del círculo están los datos. Y alrededor giran seis fases, unidas por flechas que van y vuelven.", "c": false}, {"t": "Vamos fase por fase.", "c": false}, {"t": "Fase uno: comprensión del negocio. Aquí defines el objetivo de negocio y lo traduces a un problema de datos.", "c": false}, {"t": "Fase dos: comprensión de los datos. Aquí exploras qué datos hay, qué calidad tienen y si contienen la señal que buscas. Entre la fase uno y la fase dos hay una flecha que va en los dos sentidos, porque se alimentan mutuamente.", "c": false}, {"t": "Fase tres: preparación de los datos. Aquí limpias, integras, transformas y etiquetas. Es la fase más laboriosa de todas.", "c": false}, {"t": "Fase cuatro: modelado. Aquí, por fin, entrenas los algoritmos.", "c": false}, {"t": "Fase cinco: evaluación. Aquí mides si el modelo cumple el objetivo de negocio, no solo el objetivo técnico. Desde esta fase, una flecha puede devolverte hasta la fase uno.", "c": false}, {"t": "Fase seis: despliegue. Aquí pones el modelo en producción para que genere valor de verdad.", "c": false}, {"t": "El bucle exterior de la figura indica que el proceso es continuo. Al desplegar, se generan nuevos datos que reinician el ciclo.", "c": false}, {"t": "Una analogía para fijar la idea. Crisp D M es como cocinar un plato nuevo sin receta fija.", "c": false}, {"t": "No decides el menú y compras a ciegas. Pruebas qué ingredientes tienes, que son los datos. Ajustas el plato al gusto del mercado, que es el negocio. Cocinas una versión, que es el modelo. La pruebas, que es la evaluación. Y según el resultado, vuelves a cambiar ingredientes, o incluso el plato entero.", "c": false}, {"t": "El centro de la cocina siempre es la despensa: los datos.", "c": false}, {"t": "Y aquí tenemos la primera nota de discrepancia importante, de esas con olor a examen. Presta atención.", "c": false}, {"t": "El curso presenta Crisp D M con seis fases que terminan en el despliegue. Así se evalúa, y es correcto. Esta metodología sigue vigente desde hace más de dos décadas: su guía se publicó entre mil novecientos noventa y nueve y el año dos mil.", "c": false}, {"t": "Pero la práctica moderna señala su límite. Crisp D M no cubre el ciclo de vida posterior al despliegue.", "c": false}, {"t": "Es decir, no cubre el monitoreo continuo, el reentrenamiento automático, el versionado de modelos ni la gestión de la deriva de datos.", "c": false}, {"t": "Eso lo cubren hoy los enfoques que se llaman M L Ops, y metodologías como T D S P, que es el Proceso de Ciencia de Datos en Equipo, de Microsoft.", "c": false}, {"t": "La regla para el examen es simple. Si te preguntan las fases de Crisp D M, son seis y terminan en despliegue. Si te preguntan por la operación continua de modelos ya desplegados, la respuesta es M L Ops, no Crisp D M.", "c": false}, {"t": "Capítulo 4. Las cuatro uves de los datos", "c": true}, {"t": "Ya confirmamos que los datos existen y disponemos de un proceso para ordenarlos. Pero tener datos no significa tener datos útiles.", "c": false}, {"t": "Los datos pueden existir y aun así ser insuficientes, poco representativos, desactualizados o de mala calidad para entrenar un modelo confiable.", "c": false}, {"t": "Para evaluar esa adecuación usamos el marco de las cuatro uves. Es una forma simple y muy usada de juzgar la materia prima, sin entrar en detalles técnicos complejos.", "c": false}, {"t": "Las cuatro dimensiones son: volumen, variedad, velocidad y veracidad. Vamos una por una.", "c": false}, {"t": "Primera uve: el volumen. Mide dos cosas: cuántas observaciones hay, que son las filas, y cuánta profundidad de información tienen, que son los atributos o columnas.", "c": false}, {"t": "La regla práctica es que distintas técnicas exigen distinto volumen.", "c": false}, {"t": "Una regresión simple puede necesitar del orden de cientos de filas. En cambio, el análisis de texto o de imágenes suele necesitar miles de ejemplos por cada categoría.", "c": false}, {"t": "Formalmente, el tamaño de una tabla es filas por columnas. Es decir, el volumen es igual al número de observaciones multiplicado por el número de atributos.", "c": false}, {"t": "Los dos importan. Un modelo con muchas columnas y muy pocas filas tiende a sobreajustar, es decir, se aprende de memoria los casos en vez de generalizar.", "c": false}, {"t": "Un ejemplo numérico para aterrizarlo. Imagina que quieres clasificar reclamos en cinco categorías con un modelo de texto.", "c": false}, {"t": "Si miles de ejemplos por categoría significa apuntar a unos dos mil por cada una, entonces necesitas cinco categorías por dos mil, o sea unos diez mil reclamos ya etiquetados.", "c": false}, {"t": "Si en total solo tienes trescientos, o sea unos sesenta por categoría, el volumen es insuficiente. Y el proyecto es inviable, aunque el algoritmo sea excelente.", "c": false}, {"t": "Segunda uve: la variedad. No basta con muchos datos: deben cubrir todos los escenarios posibles, incluyendo los eventos raros, como fraudes, fallas o clientes atípicos.", "c": false}, {"t": "Además, la inteligencia artificial muchas veces trabaja con datos no estructurados, como texto, imágenes o audio, que exigen un preprocesamiento extenso para convertirlos en tablas que los algoritmos puedan digerir.", "c": false}, {"t": "La analogía de la variedad: entrenar solo con casos normales es como estudiar para un examen viendo únicamente las preguntas fáciles. El día que aparece el caso raro, el fraude nunca visto, el modelo no sabe cómo reaccionar.", "c": false}, {"t": "Tercera uve: la velocidad. Es la frecuencia con que los datos se actualizan.", "c": false}, {"t": "Los datos de alta velocidad, como transacciones por segundo o sensores, exigen infraestructuras más robustas.", "c": false}, {"t": "Y presentan un mayor riesgo de deriva de datos, lo que obliga a reentrenar los modelos con más frecuencia.", "c": false}, {"t": "La deriva de datos es cuando los datos de producción cambian respecto a los datos con los que se entrenó el modelo, y por eso la precisión se va degradando con el tiempo.", "c": false}, {"t": "Cuarta uve, y la más importante de todas: la veracidad. En inglés se le dice también verdad fundamental, o ground truth.", "c": false}, {"t": "Es la dimensión más crítica para el aprendizaje supervisado, que es cuando el modelo aprende a partir de ejemplos ya etiquetados con la respuesta correcta.", "c": false}, {"t": "La veracidad se refiere a si los datos contienen esa verdad fundamental, esas etiquetas correctas.", "c": false}, {"t": "Sin etiquetas precisas que le indiquen al modelo qué es correcto, por ejemplo, si un cliente realmente se fugó, el sistema no tiene un punto de referencia para aprender.", "c": false}, {"t": "Piensa en la veracidad como el profesor del aprendizaje. Si el profesor da respuestas equivocadas, el alumno aprende mal.", "c": false}, {"t": "Un ejemplo con el caso del banco. La etiqueta veraz sería: esta cuenta se cerró por decisión del cliente el doce de marzo.", "c": false}, {"t": "Pero si en el histórico las cuentas cerradas por fallecimiento, por fusión de sucursales y por decisión del cliente están todas marcadas igual, como simple baja, entonces la veracidad es baja.", "c": false}, {"t": "El modelo aprenderá a predecir bajas mezcladas, no fuga real de clientes.", "c": false}, {"t": "El curso muestra una figura con esto: un gráfico de radar con cuatro ejes, uno por cada uve, en una escala de cero a cinco.", "c": false}, {"t": "Cada caso de uso se puntúa en cada eje y se dibuja el polígono que resulta. Un caso con volumen y variedad altos, pero velocidad y veracidad medias, forma una figura alargada hacia arriba.", "c": false}, {"t": "Y aquí está lo importante: el valor de las cuatro uves no es producir una medición exacta.", "c": false}, {"t": "Su valor es comparar casos de uso entre sí y detectar debilidades temprano.", "c": false}, {"t": "Un proyecto puede tener altísimo impacto y aun así ser inviable si sus datos carecen de volumen o tienen baja veracidad.", "c": false}, {"t": "Y al revés: un caso aparentemente simple puede convertirse en una victoria rápida si la organización ya tiene datos abundantes, estructurados y bien gobernados.", "c": false}, {"t": "La moraleja del curso es contundente: en muchos casos, la gobernanza de los datos puede ser más importante que la tecnología que usas para el modelado.", "c": false}, {"t": "Y aquí viene la segunda discrepancia de examen, sobre estas mismas uves.", "c": false}, {"t": "El curso usa cuatro uves: volumen, variedad, velocidad y veracidad. Esta es la versión aplicada a evaluar datos para inteligencia artificial.", "c": false}, {"t": "Pero en el material complementario aparecen las cinco uves del Big Data: volumen, velocidad, variedad, veracidad y, la quinta, valor.", "c": false}, {"t": "Conviene conocer el linaje. El modelo original fue de tres uves, volumen, velocidad y variedad, propuesto por Doug Laney en el año dos mil uno, cuando trabajaba en la consultora Meta Group, no en Gartner. Gartner la compró recién en dos mil cinco.", "c": false}, {"t": "La veracidad se añadió después, atribuida a I B M alrededor del año dos mil doce. Y el valor se agregó más tarde todavía.", "c": false}, {"t": "Regla para el examen: en este curso, evaluar datos es con cuatro uves. Si te preguntan por las uves del Big Data en general, probablemente esperan cinco, y la quinta es el valor, o sea el retorno que los datos aportan al negocio.", "c": false}, {"t": "Capítulo 5. Fabricar o comprar, y las tres capas de una solución", "c": true}, {"t": "Ya evaluamos la materia prima. Ahora, ¿de dónde sacamos la tecnología? Esa es la decisión de fabricar o comprar, que en inglés se llama make or buy.", "c": false}, {"t": "El problema de fondo: construir una solución de inteligencia artificial desde cero es costoso y técnicamente complejo.", "c": false}, {"t": "Además de desarrollar el modelo, la organización debe gestionar la infraestructura, el almacenamiento, la integración de datos, el monitoreo y el mantenimiento continuo.", "c": false}, {"t": "Por eso muchas empresas combinan sus capacidades internas con servicios externos, según sus recursos, sus necesidades y su madurez tecnológica.", "c": false}, {"t": "El curso define cuatro enfoques. Piénsalos como un espectro que va de menos a más control, y también de menos a más responsabilidad del cliente.", "c": false}, {"t": "Primer enfoque: inteligencia artificial como servicio. En inglés se abrevia A I a a S.", "c": false}, {"t": "Aquí la organización solo consume modelos ya entrenados de proveedores externos, a través de interfaces de programación, es decir, conexiones estándar entre sistemas.", "c": false}, {"t": "Es la opción más rápida y sencilla de implementar. Ideal para tareas generales como reconocimiento de imágenes, análisis de sentimientos o transcripción de voz.", "c": false}, {"t": "Su principal limitación es el bajo nivel de control y de personalización sobre el modelo. Comes lo que hay en el menú.", "c": false}, {"t": "Segundo enfoque: plataforma como servicio. En inglés, P a a S.", "c": false}, {"t": "Aquí la empresa usa plataformas gestionadas de aprendizaje automático para entrenar y desplegar sus propios modelos, sin tener que gestionar directamente la infraestructura.", "c": false}, {"t": "Equilibra facilidad y flexibilidad. Permite experimentar rápido, con herramientas de automatización del entrenamiento, lo que se conoce como AutoML, y con modelos preentrenados que se pueden ajustar.", "c": false}, {"t": "Tercer enfoque: infraestructura como servicio. En inglés, I a a S.", "c": false}, {"t": "Aquí la organización arrienda capacidad de cómputo y gestiona directamente sus modelos, sus flujos de procesamiento y sus herramientas de desarrollo.", "c": false}, {"t": "Ofrece mayor flexibilidad y control, pero exige equipos especializados en la nube y en aprendizaje automático.", "c": false}, {"t": "Cuarto enfoque: propiedad integral, o en las propias instalaciones. En inglés se dice on premise.", "c": false}, {"t": "Aquí toda la infraestructura, los datos y los modelos se gestionan internamente.", "c": false}, {"t": "Da control total y a veces es necesario en entornos altamente regulados, como banca, salud o defensa. Pero conlleva el mayor nivel de complejidad, costo y demanda de talento especializado.", "c": false}, {"t": "Una analogía que recorre todo el espectro, con las formas de tener comida.", "c": false}, {"t": "La inteligencia artificial como servicio es pedir delivery: rapidísimo, cero esfuerzo, pero comes lo que hay en el menú.", "c": false}, {"t": "La plataforma como servicio es un kit de cocina que llega a tu casa con los ingredientes cortados y la receta. Tú cocinas y eliges el punto, pero no vas al mercado ni lavas las ollas industriales.", "c": false}, {"t": "La infraestructura como servicio es arrendar una cocina profesional equipada. Tú traes los ingredientes, las recetas y los cocineros.", "c": false}, {"t": "Y la propiedad integral es construir y ser dueño de tu propio restaurante. Control absoluto, pero pagas el arriendo, el personal y cada reparación.", "c": false}, {"t": "La decisión no es solo técnica. Depende del presupuesto, la urgencia, las capacidades internas y el valor estratégico que tendrá la inteligencia artificial para el negocio.", "c": false}, {"t": "La recomendación práctica del curso: en muchos casos conviene empezar con servicios administrados, como la inteligencia artificial como servicio o la plataforma como servicio, para validar rápido los casos de uso antes de avanzar a arquitecturas más complejas y personalizadas.", "c": false}, {"t": "Y aquí, la tercera discrepancia. En el marco estándar de la nube, conocido como el marco NIST, los tres modelos clásicos son infraestructura, plataforma y software como servicio.", "c": false}, {"t": "La inteligencia artificial como servicio no es una categoría oficial de ese marco. Una interfaz de inteligencia artificial lista para usar se comporta como una capa de software como servicio, pero especializada.", "c": false}, {"t": "Y una plataforma de aprendizaje automático gestionada cae más cerca de la plataforma como servicio.", "c": false}, {"t": "De todos modos, el orden de control del cliente que enseña el curso es correcto y estándar: de menor a mayor control van la inteligencia artificial como servicio, luego la plataforma, luego la infraestructura, y por último la propiedad integral.", "c": false}, {"t": "Ahora que sabemos de dónde sacar la tecnología, veamos cómo se estructura por dentro una solución de inteligencia artificial. La mayoría se explican con tres capas: usuario, análisis y datos.", "c": false}, {"t": "La primera es la capa de usuario. Es la forma en que las personas o los sistemas interactúan con la solución.", "c": false}, {"t": "Puede ser un tablero visual, una aplicación web, un asistente conversacional, una interfaz de programación, o incluso un archivo automatizado.", "c": false}, {"t": "Definir esta capa primero ayuda a delimitar el alcance del proyecto y el resultado esperado para el usuario final.", "c": false}, {"t": "La segunda es la capa de análisis. Es el núcleo, donde se ejecutan las capacidades de aprendizaje automático.", "c": false}, {"t": "Aquí viven los modelos predictivos, los clasificadores, los sistemas de recomendación y los algoritmos de detección de anomalías, que identifican observaciones que se salen de lo esperado.", "c": false}, {"t": "A veces esta capa combina reglas de negocio tradicionales con modelos de inteligencia artificial, formando soluciones híbridas.", "c": false}, {"t": "La tercera es la capa de datos. Incluye las fuentes de información y los procesos que preparan los datos antes de usarlos.", "c": false}, {"t": "Ahí están las bases de datos, los archivos, las interfaces de programación, los sensores, y sistemas empresariales como el de gestión empresarial y el de gestión de clientes.", "c": false}, {"t": "También cubre la limpieza, integración, etiquetado y transformación de datos. Es decir, la misma preparación de datos que vimos en Crisp D M.", "c": false}, {"t": "La analogía es un restaurante. La capa de datos es la despensa y la cocina, donde se preparan los ingredientes. La capa de análisis es el chef, que transforma ingredientes en platos, ahí está la inteligencia. Y la capa de usuario es el mesero y el plato servido, lo único que el comensal ve.", "c": false}, {"t": "Un ejemplo que integra todo, y que atraviesa la unidad. En un sistema de predicción de fuga de clientes, los datos vienen del sistema de gestión de clientes y del de gestión empresarial, esa es la capa de datos.", "c": false}, {"t": "Esos datos son procesados por un modelo de clasificación, esa es la capa de análisis. Y el resultado se muestra en un tablero para los equipos comerciales, esa es la capa de usuario.", "c": false}, {"t": "En un asistente conversacional, en cambio, el flujo es de ida y vuelta. Las conversaciones de los usuarios generan nuevos datos, que luego sirven para reentrenar y mejorar el modelo. Y así se cierra el bucle de Crisp D M.", "c": false}, {"t": "El objetivo de entender estas capas no es convertir a los responsables de negocio en ingenieros de software. Es permitirles evaluar con claridad la complejidad técnica, los componentes involucrados y los riesgos de implementación de cada caso de uso.", "c": false}, {"t": "Capítulo 6. La ética, los sesgos y la discriminación", "c": true}, {"t": "Tenemos los datos, el proceso y la arquitectura. Falta una dimensión que puede hundir un proyecto: la ética.", "c": false}, {"t": "Aclaremos primero qué es y qué no es la ética en inteligencia artificial. No se trata de máquinas conscientes tomando decisiones morales.", "c": false}, {"t": "Se trata de la responsabilidad de las personas y las organizaciones que diseñan, implementan y usan estos sistemas.", "c": false}, {"t": "Cada caso de uso puede tener consecuencias reales para individuos, organizaciones o comunidades. Por eso las implicaciones éticas deben considerarse desde las primeras etapas del proyecto.", "c": false}, {"t": "Y ojo: no todos los sistemas tienen el mismo riesgo.", "c": false}, {"t": "Clasificar automáticamente tickets de soporte tiene un impacto menor. Pero un diagnóstico médico, una evaluación de crédito o la selección de candidatos a un empleo pueden influir directamente en la vida de las personas.", "c": false}, {"t": "Por eso el riesgo ético depende tanto de la tecnología como del contexto donde se aplica.", "c": false}, {"t": "El curso propone dos dimensiones para analizarlo de forma práctica.", "c": false}, {"t": "La primera es la criticidad ética. Evalúa si la decisión de la inteligencia artificial afecta el bienestar, la libertad o la vida de las personas.", "c": false}, {"t": "Un sistema que controla la calidad de teclados en una fábrica tiene baja criticidad ética. Uno que determina diagnósticos médicos o aprueba créditos bancarios es altamente crítico.", "c": false}, {"t": "La segunda dimensión es la criticidad de la privacidad. Evalúa el tipo de datos que se usan, desde datos de máquinas anónimos hasta datos personales altamente sensibles.", "c": false}, {"t": "Y aquí va un punto sutil, con mucho olor a examen. Incluso si los datos son anónimos, el caso de uso puede ser éticamente crítico si el resultado afecta la vida de las personas.", "c": false}, {"t": "El ejemplo son las pruebas de medicamentos: los datos pueden despersonalizarse, pero la decisión afecta la salud de la gente.", "c": false}, {"t": "Estas dos dimensiones ayudan a identificar qué proyectos requieren mayor supervisión y control.", "c": false}, {"t": "Un control de calidad industrial opera con bajo riesgo ético y pocos problemas de privacidad. En cambio, un modelo de evaluación de crédito puede afectar las oportunidades económicas de millones de personas y usar información sensible. Ese es un caso de alta criticidad.", "c": false}, {"t": "Y algo clave: la evaluación ética no es un ejercicio único que se hace una sola vez.", "c": false}, {"t": "Los modelos pueden degradarse, incorporar sesgos no previstos o producir efectos no deseados cuando cambian las condiciones del entorno. De nuevo aparece la deriva.", "c": false}, {"t": "Por eso las organizaciones deben establecer mecanismos permanentes de monitoreo, revisión y gobernanza.", "c": false}, {"t": "Más que buscar una evaluación ética perfecta, lo importante es tener criterios claros y consistentes para analizar riesgos antes de desplegar soluciones en ambientes reales.", "c": false}, {"t": "El curso lo ilustra con una matriz. En el eje horizontal está la criticidad ética, que crece hacia la derecha. En el eje vertical está la criticidad de privacidad, que crece hacia arriba.", "c": false}, {"t": "Y los casos se ordenan en tres bandas, según cuán personales sean los datos.", "c": false}, {"t": "En la banda de abajo, sin datos personales, están las predicciones del clima, el internet de las cosas, la conducción autónoma y las pruebas de medicamentos.", "c": false}, {"t": "Fíjate que las pruebas de medicamentos aparecen con datos poco personales, pero con alta criticidad ética, porque afectan vidas. Es justo el punto de que anonimato no significa bajo riesgo.", "c": false}, {"t": "En la banda del medio, datos relacionados con personas, están los anuncios en línea, la tarificación de seguros, el predictor de abandono de clientes entre empresas, y los drones de combate.", "c": false}, {"t": "En la banda de arriba, datos personales, están los anuncios en redes sociales, la evaluación de riesgo crediticio, el predictor de abandono de clientes finales, y los servicios de inteligencia.", "c": false}, {"t": "La lectura es esta: a medida que un caso sube, porque usa datos más personales, y se desplaza a la derecha, porque impacta más en la vida, aumenta la exigencia de supervisión.", "c": false}, {"t": "Un predictor de abandono de consumidores finales es más sensible que uno entre empresas, aunque técnicamente sean casi el mismo modelo.", "c": false}, {"t": "La analogía: piensa en dos semáforos cruzados. Uno mide cuánto puede dañar a una persona, el otro mide cuán íntimos son los datos.", "c": false}, {"t": "Un control de calidad de teclados está en verde con verde. Un modelo de crédito con datos personales está en rojo con rojo, máxima criticidad, y necesita conducir con las dos manos: auditoría, explicabilidad y monitoreo.", "c": false}, {"t": "Ahora, el tema de los sesgos y la discriminación. El sesgo aparece cuando el modelo aprende patrones injustos que ya estaban en los datos históricos, y los perpetúa como discriminación algorítmica.", "c": false}, {"t": "Un ejemplo real. En dos mil dieciocho, Amazon descartó una herramienta interna de inteligencia artificial que filtraba currículums, porque penalizaba a las mujeres.", "c": false}, {"t": "Había sido entrenada con currículums de la década anterior, mayoritariamente de hombres, y había aprendido a castigar términos asociados a lo femenino.", "c": false}, {"t": "El sesgo no estaba en el código: estaba en los datos. Es exactamente el riesgo que buscan anticipar la evaluación de veracidad y la evaluación ética.", "c": false}, {"t": "Otro caso conocido es Compas, del año dos mil dieciséis, un algoritmo de riesgo de reincidencia usado en tribunales de Estados Unidos, que, según una investigación periodística, marcaba con más frecuencia a los acusados negros como de alto riesgo.", "c": false}, {"t": "Y llegamos a la cuarta discrepancia. El curso reduce la ética a dos dimensiones, criticidad ética y de privacidad. Es una simplificación didáctica útil para priorizar.", "c": false}, {"t": "Pero el estándar de referencia que el propio curso cita en su bibliografía son las Directrices Éticas para una Inteligencia Artificial Fiable, de la Comisión Europea, del año dos mil diecinueve.", "c": false}, {"t": "Ese estándar define una inteligencia artificial fiable con tres componentes: que sea legal, ética y robusta. Y con siete requisitos.", "c": false}, {"t": "Los siete requisitos son: uno, acción y supervisión humanas. Dos, robustez técnica y seguridad. Tres, privacidad y gobernanza de datos. Cuatro, transparencia.", "c": false}, {"t": "Cinco, diversidad, no discriminación y equidad. Seis, bienestar social y ambiental. Y siete, rendición de cuentas.", "c": false}, {"t": "Regla para el examen: para clasificar la criticidad de un caso, usa las dos dimensiones. Pero si te preguntan por el marco europeo de inteligencia artificial fiable, son siete requisitos.", "c": false}, {"t": "Capítulo 7. La hoja de ruta priorizada y el caso del scoring de crédito", "c": true}, {"t": "Llegamos al final, donde todo se junta. Ya evaluamos el impacto potencial en la Unidad 1, y la viabilidad técnica, de datos y ética en esta Unidad 2. Con eso, la organización puede construir una hoja de ruta priorizada.", "c": false}, {"t": "El objetivo no es solo identificar ideas interesantes. Es priorizar las que combinan mayor valor para el negocio con mayores probabilidades de éxito.", "c": false}, {"t": "La herramienta es la matriz de impacto contra viabilidad. Cada caso de uso se ubica en dos ejes.", "c": false}, {"t": "El impacto es el valor potencial para el negocio: aumento de ingresos, reducción de costos o mejora de la experiencia de los clientes.", "c": false}, {"t": "La viabilidad es qué tan factible es implementarlo, considerando los datos, la infraestructura, las capacidades internas y las restricciones éticas.", "c": false}, {"t": "No hace falta métricas perfectas ni modelos matemáticos complejos. En etapas iniciales suele ser más útil comparar los casos de forma relativa: cuáles parecen más prometedores, cuáles son alcanzables y cuáles tienen más incertidumbre.", "c": false}, {"t": "Conceptualmente, puedes pensar la prioridad como el impacto multiplicado por la viabilidad.", "c": false}, {"t": "Un caso con impacto altísimo pero viabilidad casi nula rinde poco, porque el producto se derrumba. Igual que uno muy viable pero de impacto trivial.", "c": false}, {"t": "De la matriz emergen cuatro categorías, uno por cuadrante.", "c": false}, {"t": "Primer cuadrante: los campeones. Alto impacto y alta viabilidad. Son la prioridad número uno.", "c": false}, {"t": "Segundo cuadrante: las victorias rápidas. Alta viabilidad, pero impacto menor. Sirven para generar confianza en la tecnología rápidamente.", "c": false}, {"t": "Tercer cuadrante: los casos de investigación. Alto impacto, pero baja viabilidad por ahora. Hay que mantenerlos en el radar, pero sin inversión masiva inmediata.", "c": false}, {"t": "Cuarto cuadrante: reevaluar más tarde. Bajo impacto y baja viabilidad. Tienen el potencial de consumir recursos sin aportar valor real.", "c": false}, {"t": "Dos criterios prácticos adicionales. Conviene priorizar proyectos que compartan las mismas fuentes de datos o las mismas capacidades tecnológicas, porque eso reduce complejidad y acelera el aprendizaje de la organización.", "c": false}, {"t": "Y conviene combinar iniciativas ambiciosas con proyectos simples, para mantener resultados visibles mientras la organización desarrolla capacidades más avanzadas.", "c": false}, {"t": "La analogía: la matriz es como planificar reformas en una casa con presupuesto limitado.", "c": false}, {"t": "Un campeón es cambiar las ventanas viejas por unas eficientes: mucho ahorro y obra sencilla. Hazlo ya.", "c": false}, {"t": "Una victoria rápida es pintar el living: barato, rápido, impacto modesto. Te sube el ánimo.", "c": false}, {"t": "Un caso de investigación es instalar paneles solares: gran ahorro futuro, pero caro y complejo hoy. Cotiza, pero no ejecutes todavía.", "c": false}, {"t": "Y reevaluar más tarde es una fuente ornamental en el jardín: ni impacto ni facilidad. Déjala para después.", "c": false}, {"t": "Ahora apliquemos absolutamente todo a un caso integrador, el que cierra la unidad.", "c": false}, {"t": "Una institución financiera quiere usar inteligencia artificial para automatizar la aprobación de créditos. Esto se conoce como scoring de crédito.", "c": false}, {"t": "Paso uno: aplicar las cuatro uves. El equipo identifica que el volumen de datos es alto, con millones de transacciones históricas.", "c": false}, {"t": "Pero la veracidad es un desafío importante. Muchos registros antiguos no tienen una etiqueta clara de incumplimiento, por culpa de cambios en los sistemas heredados, esos sistemas viejos y obsoletos que se conocen como sistemas legacy.", "c": false}, {"t": "O sea: hay muchos datos, pero con calidad de etiqueta dudosa. Justo la dimensión más crítica para el aprendizaje supervisado.", "c": false}, {"t": "Paso dos: la arquitectura, la decisión de fabricar o comprar. La institución elige una plataforma como servicio.", "c": false}, {"t": "¿Por qué? Para mantener el control total del modelo, que la sensibilidad del negocio exige, y al mismo tiempo delegar la gestión de la infraestructura.", "c": false}, {"t": "No usa inteligencia artificial como servicio, porque perdería control sobre un modelo crítico. Y no usa propiedad integral, porque asumiría una complejidad de infraestructura innecesaria.", "c": false}, {"t": "Paso tres: la evaluación ética. El caso se clasifica como de máxima criticidad, porque usa datos personales y afecta directamente el acceso de las personas a recursos financieros.", "c": false}, {"t": "Esa clasificación obliga a incorporar una capa de inteligencia artificial explicable, que en inglés se abrevia X A I.", "c": false}, {"t": "La inteligencia artificial explicable permite al banco justificar por qué rechaza un crédito, tanto ante los clientes como ante los reguladores.", "c": false}, {"t": "Paso cuatro: la matriz de priorización. Al aplicarla, el proyecto de scoring queda clasificado como caso de investigación.", "c": false}, {"t": "¿La razón? Su complejidad ética y de datos. Tiene alto impacto, pero su viabilidad está comprometida por la baja veracidad de las etiquetas y por la exigencia regulatoria.", "c": false}, {"t": "Por eso el banco decide priorizar primero otro proyecto: la predicción de fuga de clientes, un campeón, que usa datos menos sensibles y por lo tanto es más viable y de menor riesgo.", "c": false}, {"t": "Este giro es la lección central de la unidad. El proyecto más deseable, el scoring, no siempre es el que se ejecuta primero.", "c": false}, {"t": "Un análisis estructurado, con las cuatro uves, la arquitectura, la ética y la matriz, puede recomendar empezar por un campeón más humilde, la predicción de fuga, para generar capacidades y confianza, y dejar el scoring como caso de investigación hasta resolver la veracidad de los datos y la explicabilidad.", "c": false}, {"t": "En síntesis, la evaluación ética y de viabilidad son esenciales para priorizar de forma efectiva, alineando los proyectos con los valores de la organización y minimizando los riesgos.", "c": false}, {"t": "Cerremos con la conexión explícita entre unidades, que el curso pide tener clarísima.", "c": false}, {"t": "La Unidad 1 responde: dónde crea valor la inteligencia artificial. Es decir, identificar oportunidades.", "c": false}, {"t": "La Unidad 2 responde: cuáles de esas oportunidades son realmente ejecutables. Es decir, filtrar y priorizar.", "c": false}, {"t": "Un último apunte de contexto que trae el curso: el concepto de vórtice digital.", "c": false}, {"t": "El vórtice digital es la idea de que la disrupción tecnológica funciona como un remolino que atrae al centro, que fuerza a transformarse, a las empresas que no logran adaptarse.", "c": false}, {"t": "Es el porqué estratégico detrás de toda la unidad: quien no evalúa e implementa inteligencia artificial con criterio, queda absorbido por la competencia que sí lo hace.", "c": false}, {"t": "Con esto cerramos la Unidad 2.", "c": false}, {"t": "Recapitulemos el viaje. Aprendimos a distinguir el Business Intelligence, que describe el pasado, de la inteligencia artificial, que aprende para predecir.", "c": false}, {"t": "Vimos que los datos van antes que el algoritmo, y que la gobernanza a veces importa más que la tecnología.", "c": false}, {"t": "Ordenamos el proceso con Crisp D M y sus seis fases cíclicas. Juzgamos la materia prima con las cuatro uves: volumen, variedad, velocidad y veracidad.", "c": false}, {"t": "Comparamos fabricar o comprar, con sus cuatro enfoques. Entendimos las tres capas: usuario, análisis y datos.", "c": false}, {"t": "Analizamos la ética con dos dimensiones, criticidad ética y de privacidad, y aprendimos de los sesgos y la discriminación.", "c": false}, {"t": "Y terminamos con la matriz de impacto contra viabilidad, sus cuatro cuadrantes, y el caso del scoring de crédito, donde la lección fue empezar por un campeón antes que por el proyecto más deseable.", "c": false}, {"t": "La gran idea para llevarte: antes de preguntar cómo construir un modelo, pregunta si vale la pena construirlo. Eso es evaluar la viabilidad.", "c": false}, {"t": "Gracias por escuchar. Nos vemos en la próxima unidad.", "c": false}];
const reader = document.getElementById('reader');
const pfill = document.getElementById('pfill');
const playBtn = document.getElementById('play');

// render
SEGS.forEach((s,i)=>{
  const d = document.createElement('p');
  d.className = 'seg' + (s.c ? ' chap':'');
  d.textContent = s.t;
  d.dataset.i = i;
  d.onclick = ()=>{ speakFrom(i); };
  reader.appendChild(d);
});
const nodes = [...document.querySelectorAll('.seg')];

let idx = 0, playing = false, rate = 1;
const synth = window.speechSynthesis;
let voices = [], chosenVoice = null;

function loadVoices(){
  voices = synth.getVoices().filter(v=>v.lang.toLowerCase().startsWith('es'));
  if(!voices.length) voices = synth.getVoices();
  const sel = document.getElementById('voice');
  sel.innerHTML='';
  voices.forEach((v,i)=>{
    const o=document.createElement('option');
    o.value=i; o.textContent=v.name.replace(/Microsoft |Google /,'')+' ('+v.lang+')';
    sel.appendChild(o);
  });
  // prefer a natural es voice
  let pref = voices.findIndex(v=>/es-MX|es-US|es-419/i.test(v.lang));
  if(pref<0) pref = voices.findIndex(v=>v.lang.toLowerCase().startsWith('es'));
  if(pref<0) pref=0;
  sel.value=pref; chosenVoice=voices[pref];
  sel.onchange=()=>{ chosenVoice=voices[sel.value]; if(playing){ synth.cancel(); speakFrom(idx);} };
}
loadVoices();
if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=loadVoices;

function highlight(i){
  nodes.forEach((n,k)=>{
    n.classList.toggle('active', k===i);
    n.classList.toggle('done', k<i);
  });
  pfill.style.width = ((i)/(SEGS.length-1)*100).toFixed(1)+'%';
  const el = nodes[i];
  const r = el.getBoundingClientRect();
  if(r.top < 90 || r.bottom > window.innerHeight-210){
    el.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function speakSeg(i){
  if(i>=SEGS.length){ stop(); pfill.style.width='100%'; return; }
  idx=i; highlight(i);
  const u = new SpeechSynthesisUtterance(SEGS[i].t);
  if(chosenVoice) u.voice=chosenVoice;
  u.lang = chosenVoice ? chosenVoice.lang : 'es-ES';
  u.rate = rate; u.pitch = 1;
  u.onend = ()=>{ if(playing) speakSeg(i+1); };
  synth.speak(u);
}
function speakFrom(i){ synth.cancel(); playing=true; playBtn.innerHTML='&#10074;&#10074;'; speakSeg(i); }
function stop(){ playing=false; synth.cancel(); playBtn.innerHTML='&#9658;'; }

playBtn.onclick=()=>{
  if(playing){ stop(); }
  else { speakFrom(idx); }
};
document.getElementById('next').onclick=()=>{ speakFrom(Math.min(idx+1,SEGS.length-1)); };
document.getElementById('prev').onclick=()=>{ speakFrom(Math.max(idx-1,0)); };

// speed
document.querySelectorAll('.spd button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.spd button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); rate=parseFloat(b.dataset.r);
    if(playing){ synth.cancel(); speakSeg(idx); }
  };
});

// chapters
const chapList=document.getElementById('chapList');
SEGS.forEach((s,i)=>{
  if(s.c){
    const d=document.createElement('div');
    d.className='chap-item';
    d.innerHTML='<span class="cn">&#9834;</span>'+s.t;
    d.onclick=()=>{ closeSheet(); speakFrom(i); };
    chapList.appendChild(d);
  }
});
const sheet=document.getElementById('sheet');
document.getElementById('chapBtn').onclick=()=>sheet.classList.add('open');
sheet.onclick=(e)=>{ if(e.target===sheet) closeSheet(); };
function closeSheet(){ sheet.classList.remove('open'); }

highlight(0);
</script>
</body>
</html>
