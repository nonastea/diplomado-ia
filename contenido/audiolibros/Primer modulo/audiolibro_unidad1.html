<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Crear valor empresarial con la IA</title>
<style>
  :root{
    --bg:#FBFAF6; --card:#FFFFFF; --card2:#F1EEE5;
    --ink:#1C2723; --soft:#5C645E; --green:#0F8A6E; --green-deep:#0B6A55;
    --amber:#C2772C; --line:#E5E1D6; --hl:#DEF1EA; --done:#AEB6AF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Avenir Next','Avenir',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:18px;line-height:1.62;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #app{display:flex;flex-direction:column;height:100dvh;max-width:760px;margin:0 auto;background:var(--bg);}

  /* HEADER */
  header{padding:16px 20px 12px;border-bottom:1px solid var(--line);flex:0 0 auto;}
  .eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--green);margin:0 0 4px;}
  header h1{font-size:1.12rem;font-weight:800;margin:0;line-height:1.25;letter-spacing:-.2px;color:var(--ink);}

  /* TEXTO */
  #reader{flex:1 1 auto;overflow-y:auto;padding:18px 20px 210px;-webkit-overflow-scrolling:touch;}
  .seg{margin:0 0 14px;color:var(--soft);transition:color .25s,background .25s;padding:3px 10px;border-radius:9px;cursor:pointer;scroll-margin-top:20px;}
  .seg.chap{color:var(--ink);font-weight:800;font-size:1.2rem;margin:26px 0 12px;line-height:1.28;}
  .seg.active{color:var(--ink);background:var(--hl);}
  .seg.chap.active{background:var(--hl);}
  .seg.done{color:var(--done);}

  /* CONTROLES */
  .bar{
    position:fixed;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;
    background:linear-gradient(180deg,rgba(251,250,246,0) 0%,var(--bg) 24%);
    padding:14px 18px calc(16px + env(safe-area-inset-bottom));
  }
  .progress{height:5px;background:var(--card2);border-radius:4px;overflow:hidden;margin:0 2px 12px;}
  .progress i{display:block;height:100%;width:0;background:var(--green);transition:width .3s;}
  .ctrls{display:flex;align-items:center;justify-content:center;gap:14px;}
  button{font-family:inherit;color:var(--ink);border:none;background:var(--card);border-radius:14px;cursor:pointer;}
  .btn-skip{width:56px;height:56px;font-size:.78rem;font-weight:700;line-height:1.05;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:1px solid var(--line);color:var(--soft);}
  .btn-skip span{font-size:1.15rem;color:var(--ink);}
  .btn-play{width:74px;height:74px;border-radius:50%;background:var(--green);color:#fff;font-size:2rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(15,138,110,.30);border:none;}
  .btn-play:active{transform:scale(.94);}
  .row2{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;}
  .pill{background:var(--card);border-radius:12px;padding:9px 12px;font-size:.86rem;color:var(--soft);display:flex;align-items:center;gap:8px;font-weight:600;border:1px solid var(--line);}
  .pill b{color:var(--ink);}
  select{font-family:inherit;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:9px 12px;font-size:.86rem;font-weight:600;max-width:46vw;}
  .spd{display:flex;gap:6px;}
  .spd button{padding:8px 11px;font-size:.82rem;font-weight:700;background:var(--card);color:var(--soft);border-radius:10px;border:1px solid var(--line);}
  .spd button.on{background:var(--green);color:#fff;border-color:var(--green);}

  /* SHEET capitulos */
  #chapBtn{background:var(--card);border-radius:12px;padding:9px 14px;font-size:.86rem;font-weight:700;color:var(--ink);border:1px solid var(--line);}
  .sheet{position:fixed;inset:0;background:rgba(28,39,35,.45);display:none;z-index:20;}
  .sheet.open{display:block;}
  .sheet-inner{position:absolute;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;background:var(--card);border-radius:20px 20px 0 0;max-height:72dvh;overflow-y:auto;padding:10px 0 24px;box-shadow:0 -8px 30px rgba(28,39,35,.14);}
  .sheet-inner h3{margin:14px 22px;font-size:.78rem;text-transform:uppercase;letter-spacing:.6px;color:var(--soft);}
  .chap-item{padding:14px 22px;font-weight:600;border-top:1px solid var(--line);cursor:pointer;color:var(--ink);}
  .chap-item:active{background:var(--hl);}
  .chap-item .cn{color:var(--green);font-weight:800;margin-right:10px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <p class="eyebrow">Audiolibro &middot; Unidad 1 &middot; voz del dispositivo</p>
    <h1>Crear valor empresarial con la IA</h1>
  </header>
  <div id="reader"></div>
</div>

<div class="bar">
  <div class="progress"><i id="pfill"></i></div>
  <div class="ctrls">
    <button class="btn-skip" id="prev"><span>&#9664;</span>Anterior</button>
    <button class="btn-play" id="play">&#9658;</button>
    <button class="btn-skip" id="next">Siguiente<span>&#9654;</span></button>
  </div>
  <div class="row2">
    <button id="chapBtn">&#9776; Capitulos</button>
    <div class="spd">
      <button data-r="0.9">0.9&times;</button>
      <button data-r="1" class="on">1&times;</button>
      <button data-r="1.25">1.25&times;</button>
      <button data-r="1.5">1.5&times;</button>
    </div>
  </div>
  <div class="row2">
    <div class="pill">Voz</div>
    <select id="voice"></select>
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <h3>Capitulos</h3>
    <div id="chapList"></div>
  </div>
</div>

<script>
const SEGS = [{"t": "Bienvenido al audiolibro de la Unidad 1 del diplomado, titulada: Crear valor empresarial con la inteligencia artificial.", "c": false}, {"t": "Vamos a recorrer, en voz alta y con calma, todo el contenido de esta unidad, como si te lo explicara un amigo mientras manejas.", "c": false}, {"t": "Esta es la puerta de entrada del curso. Todavía no vamos a programar un modelo ni a escribir consultas. Vamos a aprender a pensar dónde y por qué la inteligencia artificial genera valor dentro de una organización.", "c": false}, {"t": "La tesis central es una sola. La inteligencia de negocios clásica, que respondía qué pasó mirando el retrovisor, está mutando, gracias a la inteligencia artificial, hacia una inteligencia de decisión que además anticipa y recomienda.", "c": false}, {"t": "Toda la unidad gira alrededor de un mapa mental con dos ejes, valor contra dificultad, y de cuatro tipos de análisis: descriptivo, diagnóstico, predictivo y prescriptivo. Si dominas ese mapa y su vocabulario, dominas la unidad.", "c": false}, {"t": "Capítulo 1. Para qué estamos aquí: de la inteligencia de negocios a la inteligencia de decisión", "c": true}, {"t": "El objetivo del curso es entender cómo la evolución de la inteligencia de negocios, en inglés business intelligence, o BI, hacia la inteligencia de decisión, a través de la integración de la inteligencia artificial, transforma la toma de decisiones en las organizaciones.", "c": false}, {"t": "La meta concreta para ti como alumno es doble. Primero, identificar cómo estas tecnologías mejoran la cultura de datos. Y segundo, reconocer cómo el aprendizaje automático puede generar valor real para el negocio.", "c": false}, {"t": "A lo largo de la unidad exploramos cuatro grandes bloques, en este orden. Primero, cómo la inteligencia artificial está transformando el panorama del BI, enfocándonos en dos tendencias clave: la democratización del conocimiento y la necesidad de respuestas rápidas.", "c": false}, {"t": "Segundo, los casos de uso comunes. Tercero, una intuición precisa de qué son la inteligencia artificial y el aprendizaje automático, sin exageraciones. Y cuarto, un marco práctico de mapeo de historias de inteligencia artificial para estructurar y priorizar proyectos según su impacto en el negocio.", "c": false}, {"t": "¿Para qué sirve todo esto? Hay una frase que conviene grabarse. Este conocimiento permite dejar de basar decisiones en el instinto y empezar a fundamentarlas en datos precisos y en predicciones probabilísticas sobre el futuro.", "c": false}, {"t": "Detengámonos en esa idea. Una predicción probabilística no dice va a pasar algo. Dice: hay un setenta y ocho por ciento de probabilidad de que pase ese algo.", "c": false}, {"t": "Esa diferencia, pasar de la certeza fingida a la incertidumbre cuantificada, es la esencia del cambio cultural que propone el curso.", "c": false}, {"t": "Además, dominar el mapeo de casos de uso permite comunicar el valor de la inteligencia artificial a las partes interesadas, en inglés stakeholders, y así facilitar la adopción de la tecnología.", "c": false}, {"t": "Una nota de continuidad. Como esta es la Unidad 1, no hay módulos previos sobre los cuales construir. En cambio, esta unidad es el cimiento. Los cuatro tipos de análisis, la distinción entre algoritmo y modelo, y el marco de configuración, acciones, resultados e impacto, reaparecerán en las unidades siguientes.", "c": false}, {"t": "Capítulo 2. Los conceptos clave, uno por uno", "c": true}, {"t": "El material abre con una batería de definiciones cortas. No las vamos a resumir: las vamos a desplegar, porque cada una es una pieza del rompecabezas. Empecemos por la inteligencia de negocios.", "c": false}, {"t": "La inteligencia de negocios, o BI, es el conjunto de sistemas diseñados para procesar datos y obtener información que permita tomar decisiones seguras en escenarios complejos. Dicho de forma más técnica: son prácticas, arquitecturas y herramientas que convierten datos en información útil para decidir.", "c": false}, {"t": "¿Por qué existe? Antes del BI, las decisiones directivas se tomaban por intuición o por la experiencia de unas pocas personas. El BI nació para reemplazar decisiones basadas solo en intuiciones por decisiones fundamentadas en evidencia histórica.", "c": false}, {"t": "Su valor original fue integrar información que vivía dispersa, en sistemas distintos, en planillas sueltas, en bases separadas, y convertirla en métricas comprensibles para analistas y directivos.", "c": false}, {"t": "¿Cómo funciona el BI clásico? Consolida datos de diversas fuentes y los presenta mediante reportes, indicadores, en inglés KPIs, y paneles de control, en inglés dashboards. Su énfasis es descriptivo: describe lo que ya pasó.", "c": false}, {"t": "Y tiene dos limitaciones estructurales. Es esencialmente retrospectivo, mira el pasado. Y depende de la intervención humana: alguien tiene que construir el reporte, leerlo e interpretarlo.", "c": false}, {"t": "Una analogía. El BI clásico es el espejo retrovisor de un auto: te muestra con nitidez el camino que ya recorriste. Es indispensable para no chocar con lo que dejaste atrás, pero no te dice nada de la curva que viene. La inteligencia artificial, como veremos, agrega el parabrisas y el GPS.", "c": false}, {"t": "Un ejemplo. Un gerente comercial abre su dashboard el lunes y ve: las ventas de la región sur cayeron un doce por ciento en junio. Eso es BI descriptivo puro. Sabe qué pasó, pero no por qué, ni qué pasará, ni qué hacer.", "c": false}, {"t": "Ahora la inteligencia artificial. El material la define como una herramienta para construir entidades capaces de resolver tareas específicas, principalmente mediante el aprendizaje automático. Es una definición deliberadamente sobria: no es una máquina que piensa como un humano, sino una herramienta para fabricar sistemas que resuelven tareas concretas.", "c": false}, {"t": "¿Por qué importa esa sobriedad? Porque el curso insiste en evitar interpretaciones exageradas. La mayoría de las aplicaciones actuales de inteligencia artificial en los negocios no son inteligencias generales: son sistemas estrechos y especializados. Confundir ambas cosas lleva a expectativas irreales y a proyectos fallidos.", "c": false}, {"t": "Una analogía. La inteligencia artificial empresarial es menos como el robot de las películas y más como una calculadora muy especializada: extraordinaria en la tarea para la que fue construida, e inútil fuera de ella. Una calculadora de sacar raíces no sabe hacer café.", "c": false}, {"t": "Atención a una nota importante. El curso define la inteligencia artificial como algo que resuelve tareas principalmente mediante el aprendizaje automático. En la literatura, el aprendizaje automático es la rama dominante hoy, pero la inteligencia artificial es un campo más amplio que también incluye sistemas simbólicos y basados en reglas, búsqueda, optimización y lógica. Volveremos a esto en el capítulo de discrepancias.", "c": false}, {"t": "Sigamos con el aprendizaje automático, en inglés machine learning, o simplemente ML. El material lo define como un paradigma de programación donde el algoritmo encuentra patrones en los datos históricos para resolver tareas sin reglas codificadas manualmente.", "c": false}, {"t": "¿Qué problema resuelve? Hay tareas para las que es imposible escribir reglas a mano. Nadie puede enumerar todas las reglas que distinguen un correo de spam de uno legítimo, o los mil patrones sutiles que preceden a que un cliente abandone.", "c": false}, {"t": "El aprendizaje automático invierte la lógica de la programación. En vez de que un humano escriba las reglas, el sistema infiere las reglas a partir de ejemplos. Recibe datos históricos junto con resultados conocidos, identifica patrones estadísticos y aprende a generalizar a nuevos casos.", "c": false}, {"t": "La palabra clave es generalizar: aprender de casos vistos para acertar en casos nunca vistos.", "c": false}, {"t": "Una analogía. La programación tradicional es como enseñarle a alguien a cocinar dándole una receta exacta, paso por paso. El aprendizaje automático es como mostrarle a alguien doscientos platos ya cocinados, con su resultado, rico o malo, y dejar que deduzca solo qué combinaciones funcionan. La receta es explícita; la deducción es aprendida.", "c": false}, {"t": "Un ejemplo numérico. Para estimar el riesgo de abandono, el modelo analiza, digamos, cincuenta mil clientes pasados, de los que ya se sabe quién se fue y quién se quedó. Detecta que los clientes que hicieron tres o más reclamos en sesenta días y no usaron la aplicación en treinta días abandonaron el sesenta y ocho por ciento de las veces. Nadie le dijo eso; lo dedujo de los datos.", "c": false}, {"t": "Otra nota. Llamar al aprendizaje automático un paradigma de programación es didáctico pero impreciso. Formalmente, el aprendizaje automático es un subcampo de la inteligencia artificial, no un estilo de programación paralelo. La idea que el curso quiere transmitir, que el comportamiento se aprende en vez de codificarse, es correcta. Lo retomamos en discrepancias.", "c": false}, {"t": "Llegamos al concepto que da nombre a la unidad: la inteligencia de decisión, en inglés decision intelligence. El material la define como la fórmula resultante de sumar inteligencia artificial e inteligencia de negocios para optimizar la toma de decisiones, tanto humana como automatizada.", "c": false}, {"t": "Aunque no es una ecuación numérica, el curso la plantea como una suma. Podemos decirla así: la inteligencia de decisión es igual a la inteligencia de negocios más la inteligencia artificial.", "c": false}, {"t": "Desglosemos esa suma. El BI aporta el qué pasó y la infraestructura de datos consolidados. La inteligencia artificial aporta el qué pasará y el qué hacer. Y la suma apunta a un objetivo: optimizar la toma de decisiones, tanto la humana, un gerente mejor informado, como la automatizada, el sistema que decide solo, a escala.", "c": false}, {"t": "¿Por qué existe? Porque el BI solo, sin inteligencia artificial, se queda en describir. Y la inteligencia artificial sola, sin la infraestructura y el contexto de negocio del BI, es un motor sin chasis. La inteligencia de decisión es el chasis más el motor.", "c": false}, {"t": "Una analogía que amarra todo. Si el BI es el retrovisor, y la inteligencia artificial es el GPS predictivo, la inteligencia de decisión es el conductor experto que usa ambos instrumentos a la vez para llegar mejor y más rápido.", "c": false}, {"t": "Ahora una distinción clave: la inteligencia artificial estrecha, en inglés narrow AI. Es la tecnología capaz de resolver un problema único y bien definido, para el que ha sido entrenada. Se contrapone a la inteligencia artificial general.", "c": false}, {"t": "La inteligencia artificial general, en inglés artificial general intelligence, o AGI, sería una inteligencia capaz de abordar cualquier tipo de problema, como un humano. No existe comercialmente hoy. Casi todo lo que se usa en empresas es inteligencia artificial estrecha: un modelo de abandono no sabe traducir; un traductor no sabe detectar fraude.", "c": false}, {"t": "¿Por qué importa? Es la vacuna contra la exageración. Cuando un proveedor promete una inteligencia artificial que resolverá todos tus problemas, está prometiendo inteligencia general, que no existe. Lo realista y valioso es una batería de sistemas estrechos, cada uno excelente en su tarea.", "c": false}, {"t": "Sigamos con el algoritmo de aprendizaje automático. Es el proceso computacional que analiza un conjunto de datos para encontrar el mejor modelo posible. Y aquí viene un matiz que desarrollaremos más adelante: el algoritmo es el método; el modelo es el resultado.", "c": false}, {"t": "El algoritmo es el procedimiento de búsqueda; el modelo es lo que ese procedimiento encuentra. Una analogía: el algoritmo es la técnica de un escultor, el método de cincelado; el modelo es la estatua terminada. La misma técnica, aplicada a distintos bloques de mármol, es decir, a distintos datos, produce estatuas distintas.", "c": false}, {"t": "Otro concepto: el mapeo de historias de inteligencia artificial, en inglés use-case story mapping. Es una técnica ágil para contrastar procesos actuales con implementaciones futuras habilitadas por inteligencia artificial, estructurando el impacto y los resultados.", "c": false}, {"t": "¿Por qué existe? Porque el error más común en proyectos de inteligencia artificial es empezar por la tecnología, comprar una inteligencia artificial, antes de definir el problema. El mapeo obliga a hacerlo al revés: describir primero el proceso actual, luego imaginar el proceso con inteligencia artificial, y recién ahí ver dónde se genera valor. Lo desarrollamos entero más adelante.", "c": false}, {"t": "Y el último concepto de esta batería inicial, que además será el hilo conductor de toda la unidad: el churn. Es la tasa de abandono de clientes, es decir, el porcentaje de clientes que dejan de usar un servicio o producto en un período determinado. En inglés, churn o churn rate.", "c": false}, {"t": "Aunque el material no la escribe, hagamos explícita la fórmula. El churn se calcula dividiendo los clientes que se fueron durante el período por los clientes que había al inicio del período. Ese cociente se multiplica por cien para expresarlo como porcentaje.", "c": false}, {"t": "Un ejemplo numérico. Si una empresa empezó enero con diez mil clientes y perdió quinientos durante el mes, su churn mensual fue de un cinco por ciento.", "c": false}, {"t": "Ojo con un matiz. Si el churn aumentó un quince por ciento, no significa que llegó al quince por ciento. Significa que creció un quince por ciento relativo: de un cinco por ciento pasaría a cinco coma setenta y cinco por ciento. Y una reducción del diez por ciento tras aplicar inteligencia artificial lo devolvería a aproximadamente cinco coma dieciocho por ciento.", "c": false}, {"t": "El churn es el ejemplo estrella de toda la unidad. Aparece en las figuras, en el caso de la empresa TelecomPlus, en el ejercicio de retail y en el foro. Es el caso perfecto porque muestra el salto de describir quién se fue, que es BI clásico, a predecir quién se irá y qué ofrecerle, que es inteligencia artificial.", "c": false}, {"t": "Capítulo 3. Cómo la inteligencia artificial está cambiando el panorama del BI", "c": true}, {"t": "Esta sección es el corazón conceptual de la unidad. Su idea rectora: la incorporación de la inteligencia artificial en el BI responde a tres transformaciones simultáneas.", "c": false}, {"t": "Primera transformación: la necesidad de acceso inmediato a información relevante. El negocio ya no puede esperar a que un analista prepare un reporte la semana que viene; necesita respuestas ahora.", "c": false}, {"t": "Segunda transformación: la democratización del análisis. Se requieren herramientas accesibles para perfiles no técnicos, de modo que un jefe de tienda, sin saber programar consultas, pueda preguntar y obtener respuestas.", "c": false}, {"t": "Tercera transformación: la eliminación de barreras tecnológicas, impulsada por plataformas automatizadas y soluciones de análisis avanzado que se han vuelto accesibles.", "c": false}, {"t": "¿Y por qué ocurre esto justo ahora? Por el aumento exponencial del volumen, la velocidad y la variedad de los datos. Son las famosas tres uves del Big Data. Volumen es cuántos datos hay; velocidad es qué tan rápido llegan; variedad es de cuántos tipos distintos son.", "c": false}, {"t": "Esto está impulsado por sistemas digitales, plataformas en línea y dispositivos conectados, lo que se conoce como internet de las cosas. Con tanto dato, la capacidad de análisis manual resultó insuficiente.", "c": false}, {"t": "A eso se sumó una limitación estructural: la falta de perfiles especializados capaces de extraer valor de grandes volúmenes de datos en los tiempos que exige la operación. En pocas palabras: hay océanos de datos y muy pocos especialistas para analizarlos a la velocidad que el negocio necesita. La inteligencia artificial llena ese vacío.", "c": false}, {"t": "Ahora veamos la primera figura del material, que llamaremos la evolución del BI. Organiza toda la analítica en un plano de dos dimensiones. El eje vertical es el valor generado. El eje horizontal es la complejidad o dificultad analítica.", "c": false}, {"t": "Sobre ese plano se ubican, de menor a mayor valor y dificultad, cuatro tipos de análisis y tres visiones temporales. En esencia, es el modelo de madurez analítica, el mismo que propone la consultora Gartner.", "c": false}, {"t": "Veamos los cuatro tipos de análisis. El primero es el análisis descriptivo, en inglés descriptive. Responde a la pregunta: qué ocurrió. Está en la base del plano: bajo valor añadido y baja complejidad. Vive en la capa de ingestión y se asocia a la visión retrospectiva, en inglés hindsight. Es contar lo que pasó: las ventas del mes, el número de reclamos, la tasa de churn observada.", "c": false}, {"t": "El segundo es el análisis diagnóstico, en inglés diagnostic. Responde: por qué ocurrió. Sube un peldaño y agrega una capa interpretativa. Ya no solo dice las ventas cayeron un doce por ciento, sino que intenta explicar por qué: subió el precio, hubo quiebre de stock.", "c": false}, {"t": "El tercero es el análisis predictivo, en inglés predictive. Responde: qué es probable que suceda. Aquí ocurre el salto cualitativo que trae la inteligencia artificial. Se sitúa en la transición hacia el insight, la visión de la perspectiva, y estima qué es probable que ocurra basándose en los patrones identificados en los datos.", "c": false}, {"t": "El cuarto es el análisis prescriptivo, en inglés prescriptive. Es la cima: la zona de mayor valor y mayor complejidad, la visión anticipatoria, en inglés foresight. No solo anticipa escenarios: recomienda acciones concretas. Responde a la pregunta: qué debo hacer.", "c": false}, {"t": "La figura distingue además dos franjas horizontales. La capa de aplicación, en inglés application layer, se enfoca en la automatización y la facilidad de uso. Refleja la democratización del acceso al análisis, y vive abajo, cerca de lo descriptivo y lo diagnóstico.", "c": false}, {"t": "La capa analítica, en inglés analytical layer, concentra las capacidades avanzadas de predicción y optimización, donde se captura el mayor valor. Vive arriba, cerca de lo predictivo y lo prescriptivo. Su rótulo en la figura es: mejores pronósticos y predicciones. También aparece, en la base, el rótulo datos no estructurados, anticipando una tercera fuente de valor.", "c": false}, {"t": "La conclusión de la figura es clara: esta transición no es solo tecnológica, sino conceptual. Se pasa de un BI orientado a reportar el pasado a un sistema capaz de anticipar y guiar decisiones en tiempo casi real.", "c": false}, {"t": "Una analogía que integra los cuatro niveles. Piensa en un médico. Descriptivo: tienes fiebre de treinta y nueve grados, mide lo que pasa. Diagnóstico: es una infección bacteriana, explica por qué. Predictivo: sin tratamiento, en tres días empeorarás, anticipa. Prescriptivo: toma este antibiótico cada ocho horas, recomienda la acción. El valor sube en cada escalón, y también la dificultad.", "c": false}, {"t": "Veamos ahora los tres mecanismos por los que la inteligencia artificial aporta valor al BI. El material afirma algo importante: la inteligencia artificial amplía la capacidad analítica sin aumentar proporcionalmente la complejidad para el usuario final. Es decir, hace el análisis más potente y a la vez más fácil de usar.", "c": false}, {"t": "Primer mecanismo: automatización y facilidad de uso. Tareas que antes requerían intervención técnica, como explorar múltiples variables, identificar patrones o generar reportes, ahora se ejecutan automáticamente dentro de plataformas analíticas.", "c": false}, {"t": "Esto permite que los usuarios formulen preguntas en lenguaje natural, obtengan explicaciones automáticas o reciban alertas, sin construir consultas complejas. El impacto es doble: mejora la eficiencia y reduce estructuralmente la dependencia de especialistas. Ya no hace falta un analista para cada pregunta.", "c": false}, {"t": "Aquí el material muestra una segunda figura, sobre automatización y democratización. Usa el mismo plano de valor contra dificultad, pero enfatiza la parte baja: las capacidades descriptivas y diagnósticas se concentran en la capa de aplicación. El mensaje: en estos niveles, el principal aporte de la inteligencia artificial es hacer el análisis más accesible. El valor generado aquí es acotado y orientado al pasado.", "c": false}, {"t": "Segundo mecanismo: capacidad predictiva. Mientras el análisis tradicional describe lo ocurrido, la inteligencia artificial identifica patrones complejos y estima comportamientos futuros. Se observa en problemas como la predicción de demanda, el abandono de clientes, o churn, y el riesgo financiero.", "c": false}, {"t": "La diferencia clave es la granularidad: el análisis deja de ser agregado y pasa a operar a nivel individual, lo que habilita decisiones accionables.", "c": false}, {"t": "Detengámonos en la granularidad, porque es sutil y poderoso. El BI clásico dice: proyectamos vender un tres por ciento menos el próximo trimestre, un número global. La inteligencia artificial predictiva dice: este cliente, Juan Pérez, tiene un ochenta y dos por ciento de probabilidad de irse el mes que viene.", "c": false}, {"t": "Pasar del promedio a la persona es lo que vuelve la decisión accionable. No puedes intervenir un tres por ciento, pero sí puedes llamar a Juan y ofrecerle algo.", "c": false}, {"t": "Aquí el material muestra una tercera figura, sobre el desplazamiento del valor hacia la analítica predictiva y prescriptiva. El análisis predictivo actúa como punto de inflexión entre el insight y el foresight, aumentando tanto el valor como la complejidad. Estas capacidades viven dentro de la capa analítica, la zona donde se captura el mayor valor.", "c": false}, {"t": "Tercer mecanismo: la integración de datos no estructurados. Durante décadas, el BI se centró en datos estructurados, los tabulares: ventas, inventarios, movimientos financieros, registros administrativos, todo en filas y columnas.", "c": false}, {"t": "Pero gran parte de la información relevante vive en datos no estructurados: correos electrónicos, documentos, imágenes, conversaciones de clientes, registros de audio. La inteligencia artificial permite transformar estos materiales en datos analizables.", "c": false}, {"t": "Por ejemplo, un texto puede convertirse en variables de sentimiento, lo que se llama análisis de sentimiento, o en clasificaciones temáticas. Una imagen puede convertirse en etiquetas o patrones visuales. Y un audio puede transcribirse y analizarse.", "c": false}, {"t": "Este proceso amplía el alcance del BI más allá de los datos estructurados tradicionales, y actúa como habilitador clave de las capacidades avanzadas: enriquece los modelos predictivos y prescriptivos al incorporar señales que antes quedaban fuera de la toma de decisiones formal.", "c": false}, {"t": "¿Cómo se relacionan las tres figuras? La segunda enfatiza la automatización y la democratización, la parte baja, el hacer accesible. La tercera muestra cómo el valor se desplaza hacia la analítica avanzada, la parte alta, el anticipar y recomendar. Juntas cuentan la misma historia desde dos ángulos.", "c": false}, {"t": "Vale la pena subrayar el término democratización del análisis. Es la tendencia a poner las capacidades de análisis de datos al alcance de perfiles no técnicos. La pregunta de reflexión del curso gira justo sobre esto: ¿mejora la democratización del análisis mediante inteligencia artificial la toma de decisiones en la organización?", "c": false}, {"t": "La respuesta que el curso sugiere es sí, con matices: más gente decidiendo con datos, pero con el riesgo de decidir mal si no se entienden las limitaciones del modelo.", "c": false}, {"t": "Capítulo 4. Intuir la inteligencia artificial y el aprendizaje automático, sin exageraciones", "c": true}, {"t": "Esta sección afina las definiciones anteriores y agrega el concepto más importante para el resto del diplomado: la tríada algoritmo, entrenamiento, modelo.", "c": false}, {"t": "Punto de partida: nada de ciencia ficción. La mayoría de las aplicaciones actuales son inteligencia artificial estrecha: sistemas para tareas específicas con alto nivel de precisión, no una inteligencia general.", "c": false}, {"t": "El núcleo es el aprendizaje automático. A diferencia de la programación tradicional, donde las reglas las define explícitamente un programador, en el aprendizaje automático el sistema infiere relaciones a partir de los datos. El comportamiento no se codifica de manera directa, sino que se aprende a partir de ejemplos.", "c": false}, {"t": "En términos operativos: el sistema recibe datos históricos junto con resultados conocidos y, a partir de ellos, identifica patrones estadísticos que le permiten generalizar a nuevos casos.", "c": false}, {"t": "El propio material da un ejemplo. Para estimar el riesgo de abandono de clientes, el modelo analiza observaciones pasadas y detecta configuraciones de variables que suelen preceder ese evento. Nadie le programó que con tres reclamos el cliente se irá; lo dedujo de miles de historias pasadas.", "c": false}, {"t": "Y ahora la distinción que el curso considera más relevante y que conviene dominar al dedillo: los tres componentes clave, algoritmo, entrenamiento y modelo.", "c": false}, {"t": "El algoritmo, en inglés algorithm, es el procedimiento de aprendizaje: define cómo se aprende. Es el método. La analogía: la técnica de cincelado del escultor, la receta de cómo aprender.", "c": false}, {"t": "El entrenamiento, en inglés training, es el proceso que ajusta los parámetros del algoritmo utilizando datos. La analogía: el acto mismo de esculpir, aplicar la técnica al mármol concreto.", "c": false}, {"t": "El modelo, en inglés model, es el resultado entrenado, capaz de generar predicciones. Es la instancia aprendida a partir del método. La analogía: la estatua terminada, lista para exhibirse.", "c": false}, {"t": "Aquí va la frase que conviene memorizar: el algoritmo es el método, mientras que el modelo es la instancia aprendida a partir de ese método.", "c": false}, {"t": "Dicho de otro modo: el mismo algoritmo, por ejemplo un árbol de decisión, entrenado con los datos de TelecomPlus, produce un modelo distinto que si se entrena con los datos de un banco. Método idéntico, resultado distinto, porque los datos son distintos.", "c": false}, {"t": "¿Y qué son los parámetros? Son los números internos que el modelo va afinando durante el entrenamiento para encajar con los datos, los pesos que decide dar a cada variable. Entrenar es, precisamente, buscar los parámetros que mejor reproducen los resultados conocidos.", "c": false}, {"t": "El material cierra con una advertencia crítica sobre la calidad de los datos. La efectividad del aprendizaje automático depende directamente de la calidad de los datos. El modelo no adquiere conocimiento abstracto, sino que captura las regularidades presentes en la información disponible.", "c": false}, {"t": "En consecuencia, limitaciones como sesgos, errores o falta de representatividad en los datos se reflejan en el comportamiento del modelo. Desglosemos las tres.", "c": false}, {"t": "Sesgo, en inglés bias: si los datos históricos reflejan una realidad injusta o parcial, el modelo la aprende y la perpetúa. Si un banco históricamente negó créditos a cierto grupo, un modelo entrenado con esos datos seguirá negándolos.", "c": false}, {"t": "Errores: datos mal registrados producen predicciones malas. Y falta de representatividad: si el modelo solo vio clientes urbanos, fallará con los rurales.", "c": false}, {"t": "Una analogía. El modelo es un espejo del pasado: refleja fielmente lo que había en los datos, defectos incluidos. Si le enseñas con un espejo torcido, aprenderá a ver torcido. De ahí el principio clásico del campo: basura entra, basura sale, en inglés garbage in, garbage out.", "c": false}, {"t": "Capítulo 5. Mapeo de casos de uso de inteligencia artificial para el impacto empresarial", "c": true}, {"t": "Aquí el curso entrega su herramienta práctica más concreta. Empecemos por el error que busca evitar.", "c": false}, {"t": "Uno de los principales errores en proyectos de inteligencia artificial es comenzar por la tecnología antes de definir claramente el problema de negocio. Es el clásico: tengo un martillo, la inteligencia artificial, busquemos un clavo. El mapeo invierte el orden: primero el problema, después la herramienta.", "c": false}, {"t": "La técnica se llama storyboard, o guion gráfico. Consiste en estructurar cada idea de modo que se pueda visualizar cómo cambiaría un proceso real al incorporar inteligencia artificial. Es una técnica ágil, que viene del mundo del diseño y el desarrollo ágil.", "c": false}, {"t": "Obliga a describir primero la situación inicial, o configuración: el punto de partida, los recursos existentes y las condiciones bajo las cuales opera el proceso actual. Y luego las acciones, entendidas como aquello que efectivamente cambia cuando interviene la inteligencia artificial: generar alertas automáticas, priorizar clientes, clasificar documentos o dar recomendaciones.", "c": false}, {"t": "El material presenta una cuarta figura: una matriz que contrasta el estado actual con una implementación futura habilitada por inteligencia artificial. Las filas son implementación actual e implementación futura. Las columnas son las cuatro dimensiones en que se estructura toda idea de caso de uso.", "c": false}, {"t": "Primera dimensión: configuración, en inglés setup. Es el inicio del proceso, los recursos y supuestos iniciales, el punto de partida.", "c": false}, {"t": "Segunda dimensión: acciones, en inglés actions. Es qué se genera o se modifica en el flujo de trabajo.", "c": false}, {"t": "Tercera dimensión: resultados inmediatos, en inglés outcomes. Son los productos inmediatos del proceso, por ejemplo, una lista de clientes priorizados o una predicción diaria.", "c": false}, {"t": "Cuarta dimensión: impacto, en inglés results. Es la consecuencia empresarial observable, por ejemplo, la reducción de pérdidas o el aumento de ingresos.", "c": false}, {"t": "Aquí hay una distinción sutil que conviene grabar: resultados inmediatos e impacto no son lo mismo, y confundirlos es un error clásico. Un resultado inmediato es lo que el sistema produce: una lista de doscientos clientes en riesgo. El impacto es lo que eso logra para el negocio: la reducción de pérdidas por fuga. Uno es la salida técnica; el otro, el valor de negocio.", "c": false}, {"t": "Veamos el ejemplo completo, aplicado al abandono de clientes en retail. En el estado actual, la configuración es que los equipos de tienda y servicio al cliente recogen feedback disperso entre ventas, comercio electrónico y postventa.", "c": false}, {"t": "En el estado actual, las acciones son intentar identificar problemas de forma manual: precios, quiebres de stock, tiempos de despacho. Los resultados inmediatos son la gestión de reclamos caso a caso y reportes manuales de satisfacción. Y el impacto es que el cliente puede migrar a la competencia, con pérdida de ventas recurrentes y sin detección temprana.", "c": false}, {"t": "Ahora el estado futuro, con inteligencia artificial. La configuración es la integración de datos históricos: compras en tienda y en línea, frecuencia, devoluciones, reclamos, navegación digital, con trabajo conjunto entre comercial, marketing y analítica.", "c": false}, {"t": "En el estado futuro, las acciones son el análisis de patrones de abandono, un modelo predictivo que estima la probabilidad de fuga por cliente, y la generación de explicaciones sobre los factores que influyen.", "c": false}, {"t": "En el estado futuro, los resultados inmediatos son que cada cliente recibe un puntaje de riesgo de abandono, visible en los sistemas comerciales y en el CRM, más la identificación de segmentos críticos. El CRM es el sistema de gestión de la relación con clientes.", "c": false}, {"t": "Y el impacto del estado futuro son campañas personalizadas, con descuentos y contacto proactivo, la intervención antes de la fuga, la reducción progresiva del churn y el aumento del valor del cliente en el tiempo.", "c": false}, {"t": "La utilidad del marco es doble. Primero, facilita comunicar el valor esperado a las partes interesadas. Segundo, permite evaluar tempranamente la viabilidad del caso, identificando limitaciones de datos o bajo impacto potencial antes de invertir. En resumen, conecta explícitamente los cambios operativos con los resultados de negocio.", "c": false}, {"t": "El material cierra este bloque con una quinta figura, que ubica los casos de uso dentro del modelo de madurez analítica, cerrando el círculo con la primera figura. Repite el plano de valor contra dificultad con las cuatro preguntas rotuladas.", "c": false}, {"t": "Análisis descriptivo: qué ocurrió, visión retrospectiva. Análisis diagnóstico: por qué ocurrió. Análisis predictivo: qué ocurrirá, visión de la perspectiva. Análisis prescriptivo: cómo podemos hacer que ocurra, visión de anticipación.", "c": false}, {"t": "El mensaje: no todos los casos de uso generan el mismo valor. Los que anticipan y recomiendan acciones se sitúan en los niveles más altos de impacto y complejidad. El cambio de la retrospectiva a la anticipación es la dirección del progreso.", "c": false}, {"t": "El material complementario confirma que este es el modelo de madurez analítica de Gartner: una propuesta para evaluar cómo los sistemas de análisis evolucionan desde funciones básicas de descripción del pasado hasta capacidades que apoyan directamente la toma de decisiones, es decir, lo predictivo y lo prescriptivo.", "c": false}, {"t": "Capítulo 6. La síntesis: cuatro ideas que hay que llevarse", "c": true}, {"t": "El curso ofrece un cierre conceptual que vale la pena reproducir desglosado, porque es la tesis completa. Son cuatro ideas.", "c": false}, {"t": "Primera idea: el valor del análisis se desplaza desde describir el pasado hacia anticipar y recomendar acciones. Ese desplazamiento está habilitado por tres capacidades: la automatización, la analítica avanzada y el uso de datos no estructurados.", "c": false}, {"t": "Segunda idea: la inteligencia artificial en los negocios no es una inteligencia general, sino un conjunto de herramientas especializadas, inteligencia artificial estrecha, basadas en aprendizaje automático, cuyo desempeño depende críticamente de los datos y del problema específico a resolver.", "c": false}, {"t": "Tercera idea: por eso, la identificación y estructuración de casos de uso, es decir, el mapeo, es un paso esencial, porque conecta las capacidades tecnológicas con un impacto empresarial tangible.", "c": false}, {"t": "Cuarta idea: en conjunto, la unidad establece un marco para conceptualizar la inteligencia artificial no como un fin en sí misma, sino como un medio para mejorar la toma de decisiones. Esta idea, la inteligencia artificial como medio y no como fin, es el hilo que sostendrá las unidades siguientes, cuando el curso pase de la teoría al diseño de soluciones aplicadas.", "c": false}, {"t": "Capítulo 7. El caso TelecomPlus: reducir el churn con inteligencia artificial", "c": true}, {"t": "El material dedica un caso completo a aterrizar todo lo anterior. Lo detallamos porque es puro material con olor a examen.", "c": false}, {"t": "El escenario. Laura Martínez es analista de inteligencia de negocios en TelecomPlus, una empresa de telecomunicaciones, con telefonía móvil e internet en varias regiones. Laura nota que la tasa de rotación de clientes, especialmente en el segmento joven, de dieciocho a veintinueve años, va en aumento. Esta pérdida afecta tanto la rentabilidad como el crecimiento futuro.", "c": false}, {"t": "El problema, con el enfoque tradicional, descriptivo y diagnóstico. En las reuniones mensuales, Laura presenta informes tradicionales, con tablas y gráficos que muestran un aumento del quince por ciento en la tasa de abandono.", "c": false}, {"t": "Investigando, se observa que los clientes jóvenes son los más propensos a abandonar, pero el análisis no ofrece recomendaciones claras ni decisiones específicas. Los gerentes deciden con esos datos, pero las soluciones propuestas, nuevos planes o descuentos generales para jóvenes, no resultan efectivas.", "c": false}, {"t": "El análisis se detiene en lo descriptivo: muestra quién se fue, sin ofrecer un enfoque proactivo ni personalizado. La limitación de fondo es que deja a los gerentes la responsabilidad de tomar decisiones generales basadas en su experiencia, sin herramientas que permitan una acción precisa y rápida. Es exactamente el techo del BI descriptivo.", "c": false}, {"t": "La solución, con el enfoque potenciado por inteligencia artificial, predictivo y prescriptivo. TelecomPlus decide implementar un modelo de inteligencia artificial. Laura colabora con el equipo de tecnología para entrenar un modelo de aprendizaje automático con datos históricos sobre comportamiento de compra, uso de productos e interacción con el servicio.", "c": false}, {"t": "Gracias a la inteligencia artificial, el sistema puede ahora predecir la probabilidad de abandono de cada cliente de manera individual. Aquí aparece, de nuevo, la granularidad. Y va más allá: sugiere una próxima mejor acción, en inglés next best action.", "c": false}, {"t": "La próxima mejor acción es la recomendación, generada por el modelo, de cuál es la mejor acción a tomar con cada cliente en este momento. Es el paso prescriptivo: no basta con saber quién se irá, que es predictivo; el sistema dice qué hacer con cada uno, que es prescriptivo.", "c": false}, {"t": "Por ejemplo, recomendar un descuento específico a los clientes con mayor riesgo y mayor valor, o cambiarlos a un plan que se ajuste mejor a sus necesidades. La inteligencia artificial optimiza así miles de decisiones diarias que antes habrían sido imposibles de gestionar manualmente.", "c": false}, {"t": "El resultado numérico. Tras la implementación, TelecomPlus observa una mejora significativa: la tasa de rotación disminuye un diez por ciento en el primer trimestre. Esto no solo reduce la fuga, sino que mejora los ingresos, porque retiene clientes valiosos, y permite un uso más eficiente de los recursos, porque la inteligencia artificial maneja de forma autónoma las intervenciones personalizadas.", "c": false}, {"t": "La conclusión del caso. La integración de inteligencia artificial transforma la manera de abordar el churn. Los enfoques tradicionales sirven para entender lo que ha ocurrido; la inteligencia artificial permite predecir, personalizar y actuar de forma proactiva para cambiar los resultados. Automatizar decisiones a gran escala mejora la eficiencia operativa y ofrece soluciones más específicas y efectivas.", "c": false}, {"t": "Fíjate en la conexión con el resto de la unidad. El caso TelecomPlus es la cuarta y la quinta figura en acción: recorre el eje de madurez desde la retrospectiva, los informes de Laura, hasta la anticipación, la próxima mejor acción, y usa implícitamente la matriz de configuración, acciones, resultados e impacto.", "c": false}, {"t": "Antes de cerrar, dos aplicaciones prácticas del material. El ejercicio pide seleccionar un proceso concreto de tu entorno, como ventas, atención de clientes, logística o recursos humanos, y responder tres preguntas.", "c": false}, {"t": "Primera pregunta: qué decisiones se toman hoy y con qué información. Segunda: qué problema podría abordarse con datos, como el abandono, los retrasos o las ineficiencias. Tercera: cómo cambiaría el proceso con inteligencia artificial, qué datos, qué tipo de análisis, descriptivo, predictivo o prescriptivo, y qué resultado esperas.", "c": false}, {"t": "La sugerencia es estructurar la respuesta con el esquema configuración, acciones, resultados e impacto. El objetivo no es diseñar una solución técnica, sino identificar dónde la inteligencia artificial generaría valor real en la toma de decisiones. El ejemplo de retail es la respuesta modelo.", "c": false}, {"t": "El foro colaborativo replica el ejercicio con la empresa ficticia DataConnect, de servicios de internet, con churn en el segmento de dieciocho a veintinueve años. Invita a discutir cómo la inteligencia artificial cambiaría el análisis de datos de clientes, qué recomendaciones serían más efectivas, y qué retos enfrenta una empresa al integrar inteligencia artificial: la calidad de los datos, la adopción y la interpretación.", "c": false}, {"t": "El video complementario, titulado Disrupción digital, propone una secuencia de tres ejercicios para desarrollar una forma de pensar la transformación digital. La disrupción digital es la transformación profunda de procesos y modelos de negocio impulsada por las tecnologías digitales y la inteligencia artificial.", "c": false}, {"t": "Para contexto, el curso cita tres fuentes. El libro Inteligencia empresarial basada en inteligencia artificial, de Zwingmann, publicado por O'Reilly, que es la fuente principal del marco BI más inteligencia artificial. El libro The AI Driven Business, de Calvo y Escapa. Y una publicación de Digital punto ai sobre el modelo de madurez analítica de Gartner, fuente de la primera y la quinta figura.", "c": false}, {"t": "Capítulo 8. Dos discrepancias entre el curso y la literatura", "c": true}, {"t": "Cerramos con dos matices donde lo que dice el curso difiere de lo que dice la literatura del campo. Te los explico para que sepas responder bien según cómo venga formulada la pregunta.", "c": false}, {"t": "Primera discrepancia: definir la inteligencia artificial como principalmente aprendizaje automático. El curso dice que la inteligencia artificial es una herramienta para construir entidades que resuelven tareas específicas, principalmente mediante el aprendizaje automático.", "c": false}, {"t": "La literatura dice que el aprendizaje automático es la rama dominante hoy, pero la inteligencia artificial como campo es más amplia: incluye también sistemas simbólicos, basados en reglas, búsqueda, planificación, optimización y lógica. Reducir la inteligencia artificial al aprendizaje automático describe la práctica empresarial actual, no la disciplina completa.", "c": false}, {"t": "La regla para el examen. Si la pregunta es sobre la inteligencia artificial en los negocios hoy, responde con la visión del curso: inteligencia artificial es igual a aprendizaje automático aplicado a tareas estrechas. Si la pregunta pide definir la inteligencia artificial como campo, aclara que el aprendizaje automático es su subcampo más usado, no su totalidad.", "c": false}, {"t": "Segunda discrepancia: el aprendizaje automático como paradigma de programación. El curso dice que el aprendizaje automático es un paradigma de programación donde el algoritmo encuentra patrones en los datos.", "c": false}, {"t": "La literatura dice que, formalmente, el aprendizaje automático es un subcampo de la inteligencia artificial, no un paradigma de programación paralelo a la programación tradicional. La contraposición que hace el curso, reglas explícitas contra reglas aprendidas, es correcta y didáctica, pero la etiqueta paradigma de programación es imprecisa.", "c": false}, {"t": "La regla para el examen. Conserva la idea central del curso, que es lo evaluable: en aprendizaje automático el comportamiento se aprende de ejemplos en vez de codificarse a mano. Solo matiza la clasificación, diciendo que el aprendizaje automático es un subcampo de la inteligencia artificial, si la pregunta apunta a la taxonomía del campo.", "c": false}, {"t": "Con esto cerramos la Unidad 1. Recorrimos el paso de la inteligencia de negocios a la inteligencia de decisión, los cuatro tipos de análisis y el modelo de madurez de Gartner, los tres mecanismos de valor, la tríada algoritmo, entrenamiento y modelo, el mapeo de casos de uso y el caso TelecomPlus.", "c": false}, {"t": "Si te llevas una sola idea, que sea esta: la inteligencia artificial no es un fin en sí misma, sino un medio para pasar de describir el pasado a anticipar y recomendar, decidiendo con datos en lugar de con el instinto. Nos vemos en la siguiente unidad.", "c": false}];
const reader = document.getElementById('reader');
const pfill = document.getElementById('pfill');
const playBtn = document.getElementById('play');

// render
SEGS.forEach((s,i)=>{
  const d = document.createElement('p');
  d.className = 'seg' + (s.c ? ' chap':'');
  d.textContent = s.t;
  d.dataset.i = i;
  d.onclick = ()=>{ speakFrom(i); };
  reader.appendChild(d);
});
const nodes = [...document.querySelectorAll('.seg')];

let idx = 0, playing = false, rate = 1;
const synth = window.speechSynthesis;
let voices = [], chosenVoice = null;

function loadVoices(){
  voices = synth.getVoices().filter(v=>v.lang.toLowerCase().startsWith('es'));
  if(!voices.length) voices = synth.getVoices();
  const sel = document.getElementById('voice');
  sel.innerHTML='';
  voices.forEach((v,i)=>{
    const o=document.createElement('option');
    o.value=i; o.textContent=v.name.replace(/Microsoft |Google /,'')+' ('+v.lang+')';
    sel.appendChild(o);
  });
  // prefer a natural es voice
  let pref = voices.findIndex(v=>/es-MX|es-US|es-419/i.test(v.lang));
  if(pref<0) pref = voices.findIndex(v=>v.lang.toLowerCase().startsWith('es'));
  if(pref<0) pref=0;
  sel.value=pref; chosenVoice=voices[pref];
  sel.onchange=()=>{ chosenVoice=voices[sel.value]; if(playing){ synth.cancel(); speakFrom(idx);} };
}
loadVoices();
if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=loadVoices;

function highlight(i){
  nodes.forEach((n,k)=>{
    n.classList.toggle('active', k===i);
    n.classList.toggle('done', k<i);
  });
  pfill.style.width = ((i)/(SEGS.length-1)*100).toFixed(1)+'%';
  const el = nodes[i];
  const r = el.getBoundingClientRect();
  if(r.top < 90 || r.bottom > window.innerHeight-210){
    el.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function speakSeg(i){
  if(i>=SEGS.length){ stop(); pfill.style.width='100%'; return; }
  idx=i; highlight(i);
  const u = new SpeechSynthesisUtterance(SEGS[i].t);
  if(chosenVoice) u.voice=chosenVoice;
  u.lang = chosenVoice ? chosenVoice.lang : 'es-ES';
  u.rate = rate; u.pitch = 1;
  u.onend = ()=>{ if(playing) speakSeg(i+1); };
  synth.speak(u);
}
function speakFrom(i){ synth.cancel(); playing=true; playBtn.innerHTML='&#10074;&#10074;'; speakSeg(i); }
function stop(){ playing=false; synth.cancel(); playBtn.innerHTML='&#9658;'; }

playBtn.onclick=()=>{
  if(playing){ stop(); }
  else { speakFrom(idx); }
};
document.getElementById('next').onclick=()=>{ speakFrom(Math.min(idx+1,SEGS.length-1)); };
document.getElementById('prev').onclick=()=>{ speakFrom(Math.max(idx-1,0)); };

// speed
document.querySelectorAll('.spd button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.spd button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); rate=parseFloat(b.dataset.r);
    if(playing){ synth.cancel(); speakSeg(idx); }
  };
});

// chapters
const chapList=document.getElementById('chapList');
SEGS.forEach((s,i)=>{
  if(s.c){
    const d=document.createElement('div');
    d.className='chap-item';
    d.innerHTML='<span class="cn">&#9834;</span>'+s.t;
    d.onclick=()=>{ closeSheet(); speakFrom(i); };
    chapList.appendChild(d);
  }
});
const sheet=document.getElementById('sheet');
document.getElementById('chapBtn').onclick=()=>sheet.classList.add('open');
sheet.onclick=(e)=>{ if(e.target===sheet) closeSheet(); };
function closeSheet(){ sheet.classList.remove('open'); }

highlight(0);
</script>
</body>
</html>
