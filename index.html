<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Aula IA · Diplomado UDD</title>
<style>
:root{
  --serif:'Playfair Display','Didot','Bodoni 72','Hoefler Text',Georgia,'Times New Roman',serif;
  --sans:'Avenir Next',Avenir,'Helvetica Neue','Segoe UI',system-ui,sans-serif;
  --mono:ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;
  --radius:15px; --radius-sm:11px;
}
html[data-theme="dark"]{
  --bg:#0a0a0c; --bg-side:#0c0c0f; --bg-top:#111013;
  --surface:#141317; --surface-2:#1a191e; --raised:#1e1c22;
  --border:rgba(201,168,106,.16); --border-soft:rgba(255,255,255,.06); --border-2:rgba(201,168,106,.30);
  --gold:#c9a86a; --gold-2:#e4cd97; --gold-deep:#a2823f; --gold-glow:rgba(201,168,106,.28);
  --text:#ece6da; --text-strong:#faf6ec; --muted:#a49a86; --faint:#6f685b;
  --josue:#cbaa6c; --josue-2:#e6cf98; --jeanette:#d59d86; --jeanette-2:#eab79f;
  --c-doc:#8aa2b6; --c-map:#b096b6; --c-audio:#96b58f; --c-simple:#d59d86;
  --track:rgba(255,255,255,.08);
  --shadow:0 24px 60px -28px rgba(0,0,0,.85),0 4px 14px -8px rgba(0,0,0,.6);
  --sheen:linear-gradient(180deg,rgba(201,168,106,.05),transparent 60%);
}
html[data-theme="light"]{
  --bg:#f0e9dc; --bg-side:#efe7d8; --bg-top:#faf6ee;
  --surface:#fffdf8; --surface-2:#f6f0e4; --raised:#fffdf8;
  --border:rgba(120,95,55,.18); --border-soft:rgba(60,45,20,.08); --border-2:rgba(120,95,55,.34);
  --gold:#9c7c43; --gold-2:#b8935a; --gold-deep:#7c6132; --gold-glow:rgba(156,124,67,.20);
  --text:#3c342a; --text-strong:#2a2318; --muted:#7c6f5b; --faint:#a99a80;
  --josue:#9c7c43; --josue-2:#b8935a; --jeanette:#b06f52; --jeanette-2:#c98a6b;
  --c-doc:#5c7891; --c-map:#836a86; --c-audio:#5f7d55; --c-simple:#b06f52;
  --track:rgba(60,45,20,.10);
  --shadow:0 22px 50px -26px rgba(90,70,30,.30),0 3px 10px -6px rgba(90,70,30,.16);
  --sheen:linear-gradient(180deg,rgba(156,124,67,.05),transparent 60%);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100dvh}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
h1,h2,h3,h4{margin:0;font-weight:400}
.serif{font-family:var(--serif)} strong{font-weight:700}
.kx{font-family:var(--mono);text-transform:uppercase;letter-spacing:.22em;font-size:10.5px;font-weight:500}
svg{display:block}
.ic{width:19px;height:19px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}

.app{min-height:100dvh}
.screen{display:none}.screen.active{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.theme-fab{position:fixed;top:16px;right:16px;z-index:40;width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--gold-2);cursor:pointer;display:grid;place-items:center;box-shadow:var(--shadow)}
.theme-fab:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

#v-doors{padding:clamp(30px,6vw,72px) clamp(20px,6vw,80px);min-height:100dvh;flex-direction:column;
  background:radial-gradient(60% 45% at 50% 0%,var(--bg-top),var(--bg) 70%)}
#v-doors.active{display:flex}
.d-brand{display:flex;align-items:center;gap:12px}
.d-logo{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;color:#1a1408;font-family:var(--serif);font-weight:700;font-size:20px;background:linear-gradient(135deg,var(--gold),var(--gold-2));box-shadow:0 8px 22px -8px var(--gold-glow)}
.d-brand .t{font-family:var(--serif);font-size:20px;color:var(--text-strong)} .d-brand .t em{font-style:italic;color:var(--gold)}
.d-brand .s{color:var(--muted)}
.d-hero{margin:clamp(30px,7vw,72px) 0 clamp(22px,4vw,40px)}
.d-hero .k{color:var(--gold);margin-bottom:15px}
.d-hero h1{font-family:var(--serif);font-size:clamp(34px,8vw,62px);line-height:1.04;color:var(--text-strong);font-weight:700}
.d-hero h1 em{font-style:italic;color:var(--gold)}
.d-hero p{color:var(--muted);margin-top:15px;font-size:clamp(15px,2vw,17px);max-width:52ch}
.doors{display:grid;grid-template-columns:1fr 1fr;gap:22px;max-width:920px}
.door{--c:var(--josue);--c2:var(--josue-2);position:relative;text-align:left;cursor:pointer;border-radius:var(--radius);padding:28px;overflow:hidden;color:var(--text);
  border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow);transition:transform .22s cubic-bezier(.2,.7,.2,1),border-color .22s;font-family:inherit}
.door.jeanette{--c:var(--jeanette);--c2:var(--jeanette-2)}
.door::before{content:"";position:absolute;inset:0;background:var(--sheen);pointer-events:none}
.door::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--c),var(--c2))}
.door:hover{transform:translateY(-5px);border-color:var(--border-2)}
.door:focus-visible{outline:2px solid var(--c);outline-offset:3px}
.door .av{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;margin-bottom:17px;font-family:var(--serif);font-weight:700;font-size:23px;color:var(--c2);background:color-mix(in srgb,var(--c) 15%,transparent);border:1px solid color-mix(in srgb,var(--c) 40%,transparent)}
.door h3{font-family:var(--serif);font-size:25px;color:var(--text-strong);font-weight:700}
.door .role{font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;font-size:10.5px;font-weight:600;margin-top:6px;color:var(--c)}
.door .d{color:var(--muted);font-size:14px;margin-top:14px;line-height:1.6}
.door .prog{margin-top:18px}
.door .enter{margin-top:19px;display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:12.5px;color:var(--c);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em}
.door .enter .ar{transition:transform .25s}.door:hover .enter .ar{transform:translateX(5px)}
.d-foot{margin-top:auto;padding-top:34px;color:var(--faint);font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase}

.pbar{height:6px;border-radius:999px;background:var(--track);overflow:hidden;position:relative}
.pbar>span{position:absolute;inset:0 auto 0 0;border-radius:999px;background:linear-gradient(90deg,var(--c,var(--gold)),var(--c2,var(--gold-2)))}
.plabel{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--muted);margin-bottom:7px;text-transform:uppercase}

.shell{display:flex;min-height:100dvh}
.sidebar{--c:var(--josue);--c2:var(--josue-2);flex:0 0 234px;background:var(--bg-side);border-right:1px solid var(--border-soft);
  padding:20px 16px;display:flex;flex-direction:column;gap:20px;position:sticky;top:0;height:100dvh}
.s-brand{display:flex;align-items:center;gap:11px;padding:4px 8px}
.s-logo{width:37px;height:37px;border-radius:10px;display:grid;place-items:center;color:#1a1408;font-family:var(--serif);font-weight:700;font-size:16px;background:linear-gradient(135deg,var(--gold),var(--gold-2))}
.s-brand .t{font-family:var(--serif);font-size:18px;color:var(--text-strong)} .s-brand .t em{font-style:italic;color:var(--gold)}
.s-nav{display:flex;flex-direction:column;gap:3px}
.s-lbl{font-family:var(--mono);text-transform:uppercase;letter-spacing:.18em;font-size:9.5px;color:var(--faint);padding:0 12px;margin-bottom:6px}
.nav-i{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;color:var(--muted);cursor:pointer;font-size:14px;font-weight:500;transition:background .2s,color .2s;user-select:none;border:0;background:transparent;width:100%;text-align:left;font-family:inherit}
.nav-i .ic{width:18px;height:18px}
.nav-i:hover{color:var(--text);background:var(--surface-2)}
.nav-i.on{color:var(--c2);background:color-mix(in srgb,var(--c) 14%,transparent);font-weight:600}
.nav-i:focus-visible{outline:2px solid var(--c);outline-offset:-2px}
.s-spacer{flex:1}
.account{display:flex;align-items:center;gap:11px;padding:10px;border-radius:12px;border:1px solid var(--border-soft);background:var(--surface)}
.account .ava{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:14px;color:var(--c2);background:color-mix(in srgb,var(--c) 16%,transparent);border:1px solid color-mix(in srgb,var(--c) 38%,transparent)}
.account .who .n{font-size:13.5px;font-weight:600;color:var(--text-strong)} .account .who .r{font-size:11px;color:var(--muted)}

.main{flex:1 1 auto;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:15px 24px;border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(10px);z-index:6}
.search{flex:1;display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:999px;padding:10px 16px;color:var(--muted);max-width:440px}
.search input{border:0;background:transparent;color:var(--text);font-family:inherit;font-size:13.5px;width:100%;outline:none}
.search input::placeholder{color:var(--faint)}
.top-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.top-tag{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);border:1px solid var(--border-soft);padding:8px 13px;border-radius:999px}
.icon-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border-soft);background:var(--surface-2);color:var(--gold-2);cursor:pointer;display:grid;place-items:center}
.icon-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.content{padding:24px;display:flex;flex-direction:column;gap:26px}

.greet h2{font-family:var(--serif);font-size:clamp(24px,4.5vw,32px);color:var(--text-strong);font-weight:700}
.greet p{color:var(--muted);margin-top:6px;font-size:14.5px}
.sec-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:13px}
.sec-h h3{font-family:var(--serif);font-size:19px;color:var(--text-strong);font-weight:700}
.sec-h .cnt{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}

.rows{display:flex;flex-direction:column;gap:11px}
.row{--c:var(--josue);--c2:var(--josue-2);display:flex;align-items:center;gap:16px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius);padding:15px 17px;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s,border-color .15s;text-align:left;font-family:inherit;color:var(--text);width:100%}
.row:hover{transform:translateY(-2px);border-color:var(--border-2)}
.row:focus-visible{outline:2px solid var(--c);outline-offset:2px}
.row .rn{flex:0 0 auto;font-family:var(--serif);font-size:22px;font-weight:700;color:var(--c2);width:34px;text-align:center;line-height:1}
.row .rmid{flex:1 1 auto;min-width:0}
.row .rt{font-size:14.5px;font-weight:600;color:var(--text-strong)}
.row .rmeta{font-family:var(--mono);font-size:11px;color:var(--muted);margin:5px 0 9px;letter-spacing:.02em}
.row .rst{flex:0 0 auto;font-family:var(--mono);font-size:9px;letter-spacing:.1em;font-weight:600;padding:4px 9px;border-radius:999px;text-transform:uppercase}
.rst.completa{color:var(--c-audio);background:color-mix(in srgb,var(--c-audio) 16%,transparent)}
.rst.parcial{color:var(--gold);background:color-mix(in srgb,var(--gold) 15%,transparent)}
.rst.pendiente{color:var(--faint);background:var(--surface-2)}
.row .rchev{flex:0 0 auto;color:var(--faint)}

.audio-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.acard{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px}
.acard .ah{display:flex;align-items:center;gap:11px}
.acard .aic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:var(--c-audio);background:color-mix(in srgb,var(--c-audio) 15%,transparent);border:1px solid color-mix(in srgb,var(--c-audio) 28%,transparent)}
.acard .at{font-size:13px;font-weight:600;color:var(--text-strong);line-height:1.3}
.wave{display:flex;align-items:flex-end;gap:2px;height:26px}
.wave i{flex:1;background:linear-gradient(var(--gold-2),var(--gold));border-radius:2px;opacity:.55}
.acard.off .wave i{background:var(--faint);opacity:.3}
.aplay{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);cursor:pointer;text-decoration:none}
.aplay .pbtn{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#1a1408;background:linear-gradient(135deg,var(--gold),var(--gold-2))}
.acard.off .aplay{color:var(--faint);cursor:default} .acard.off .aplay .pbtn{background:var(--surface-2);color:var(--faint);border:1px solid var(--border-soft)}

.ella{--c:var(--jeanette);--c2:var(--jeanette-2);border:1px solid color-mix(in srgb,var(--c) 34%,var(--border));border-radius:var(--radius);overflow:hidden;background:linear-gradient(160deg,color-mix(in srgb,var(--c) 12%,var(--surface)),var(--surface) 62%);box-shadow:var(--shadow)}
.ella-h{display:flex;align-items:center;gap:14px;padding:20px 20px 16px}
.ella-h .ei{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;color:var(--c2);background:color-mix(in srgb,var(--c) 16%,transparent);border:1px solid color-mix(in srgb,var(--c) 38%,transparent);flex:0 0 auto}
.ella-h .etext{flex:1;min-width:0}
.ella-h .etext h3{font-family:var(--serif);font-size:18px;color:var(--text-strong);font-weight:700}
.ella-h .etext p{font-size:12.5px;color:var(--muted);margin-top:3px}
.ella-h .ego{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--c2);border:1px solid color-mix(in srgb,var(--c) 40%,transparent);padding:9px 14px;border-radius:999px;cursor:pointer;background:transparent;display:flex;gap:7px;align-items:center;white-space:nowrap}
.ella-list{border-top:1px solid var(--border-soft)}
.ella-item{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border-soft);cursor:pointer;color:var(--text);font-size:13.5px;width:100%;background:transparent;border-left:0;border-right:0;border-top:0;font-family:inherit;text-align:left}
.ella-item:last-child{border-bottom:0}
.ella-item:hover{background:color-mix(in srgb,var(--c) 8%,transparent)}
.ella-item .eic{color:var(--c);display:grid;place-items:center}
.ella-item .en{flex:1;font-weight:500}
.ella-item .echev{color:var(--faint)}

.mod-back{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);cursor:pointer;background:transparent;border:0;padding:6px 0;margin-bottom:4px}
.mod-head .u-n{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}
.mod-head h2{font-family:var(--serif);font-size:26px;margin-top:7px;line-height:1.15;color:var(--text-strong);font-weight:700}
.mod-prog{margin:18px 0 4px;max-width:440px}
.pieces{display:flex;flex-direction:column;gap:12px;margin-top:16px}
.piece{--c:var(--c-doc);display:flex;align-items:center;gap:15px;border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;background:var(--surface);box-shadow:var(--shadow);flex-wrap:wrap}
.piece.mapa{--c:var(--c-map)}.piece.audio{--c:var(--c-audio)}.piece.explicacion_simple{--c:var(--c-simple)}
.piece .pic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;color:var(--c);flex:0 0 auto;background:color-mix(in srgb,var(--c) 15%,transparent);border:1px solid color-mix(in srgb,var(--c) 28%,transparent)}
.piece .info{flex:1 1 200px;min-width:0}
.piece .info .t{font-size:15px;font-weight:700;color:var(--text-strong)}
.piece .info .f{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;color:var(--muted);margin-top:3px;text-transform:uppercase}
.piece .act{flex:0 0 auto}
.open{border:0;color:#1a1408;font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:12px 18px;border-radius:999px;cursor:pointer;min-height:44px;display:inline-flex;gap:8px;align-items:center;text-decoration:none;background:linear-gradient(135deg,var(--gold),var(--gold-2));box-shadow:0 8px 18px -8px var(--gold-glow)}
.open:hover{filter:brightness(1.06)}
.open:focus-visible{outline:2px solid var(--text-strong);outline-offset:2px}
.soon{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;font-weight:600;color:var(--faint);background:var(--surface-2);padding:12px 15px;border-radius:999px;text-transform:uppercase}
.mod-empty{margin-top:18px;border:1px dashed var(--border-2);border-radius:var(--radius);padding:26px;text-align:center;color:var(--muted);font-size:14px;background:var(--surface-2)}

.botnav{display:none;position:sticky;bottom:0;z-index:8;background:color-mix(in srgb,var(--bg-side) 95%,transparent);backdrop-filter:blur(12px);border-top:1px solid var(--border-soft);padding:8px 8px calc(8px + env(safe-area-inset-bottom));justify-content:space-around}
.botnav button{border:0;background:transparent;color:var(--muted);font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 10px;cursor:pointer;min-width:60px}
.botnav button .ic{width:21px;height:21px}
.botnav button.on{color:var(--gold-2)}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(18px);background:var(--gold);color:#1a1408;font-weight:700;font-size:12.5px;padding:11px 19px;border-radius:999px;opacity:0;pointer-events:none;transition:.25s;z-index:60;box-shadow:var(--shadow);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width:900px){ .audio-row{grid-template-columns:repeat(2,1fr)} }
@media (max-width:680px){
  .sidebar{display:none}
  .botnav{display:flex}
  .doors{grid-template-columns:1fr}
  .content{padding:18px;gap:22px}
  .topbar{padding:13px 16px}
  .main{min-height:100dvh}
}
@media (max-width:460px){
  .audio-row{grid-template-columns:1fr}
  .search input{font-size:16px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <button class="theme-fab" id="theme-fab" aria-label="Cambiar tema">☾</button>

  <section class="screen active" id="v-doors">
    <div class="d-brand">
      <div class="d-logo">A</div>
      <div><div class="t">Aula <em>IA</em></div><div class="s kx">Diplomado UDD · Toma de decisiones con IA</div></div>
    </div>
    <div class="d-hero">
      <div class="k kx">Bienvenido</div>
      <h1>Un curso,<br><em>dos miradas</em>.</h1>
      <p>El mismo diplomado, contado a la medida de cada uno. Elige tu puerta.</p>
    </div>
    <div class="doors">
      <button class="door josue" data-p="josue">
        <div class="av">Jo</div>
        <h3>Para Josué</h3>
        <div class="role">Versión avanzada · estudio a fondo</div>
        <div class="d">Explicaciones técnicas completas, mapa conceptual, flashcards y discrepancias, y audiolibro.</div>
        <div class="prog" data-door="josue"></div>
        <span class="enter">Entrar <span class="ar">→</span></span>
      </button>
      <button class="door jeanette" data-p="jeanette">
        <div class="av">Je</div>
        <h3>Para Jeanette</h3>
        <div class="role">Versión clara · lo esencial</div>
        <div class="d">La IA explicada sin tecnicismos, con ejemplos del mundo de las ventas, y audios para escuchar.</div>
        <div class="prog" data-door="jeanette"></div>
        <span class="enter">Entrar <span class="ar">→</span></span>
      </button>
    </div>
    <div class="d-foot">Aula IA · funciona sin internet · Diplomado UDD</div>
  </section>

  <section class="screen" id="v-app">
    <div class="shell">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main">
        <div class="topbar">
          <div class="search"><svg class="ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><input placeholder="Buscar unidad…" id="search"></div>
          <div class="top-right">
            <span class="top-tag" id="toptag">Josué</span>
            <button class="icon-btn" id="theme-btn" aria-label="Cambiar tema">☾</button>
          </div>
        </div>
        <div class="content" id="content"></div>
        <nav class="botnav" id="botnav"></nav>
      </div>
    </div>
  </section>

  <div class="toast" id="toast"></div>
</div>

<script src="contenido.js"></script>
<script>
(function(){
  "use strict";
  var UNIDADES=[
    {n:1,t:"Crear valor empresarial con la IA"},
    {n:2,t:"Del BI a la inteligencia: evaluación de viabilidad"},
    {n:3,t:"Análisis descriptivo potenciado por IA"},
    {n:4,t:"Análisis de diagnóstico con IA"},
    {n:5,t:"Análisis predictivo y prescriptivo"},
    {n:6,t:"Del prototipo a la producción"}
  ];
  var ICON={
    home:'<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/>',
    doc:'<path d="M6 2h8l4 4v16H6z"/><path d="M14 2v4h4"/><path d="M9 13h6M9 17h6"/>',
    map:'<path d="M9 4L3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/>',
    head:'<path d="M4 13v-1a8 8 0 0116 0v1"/><rect x="3" y="13" width="4" height="7" rx="1.5"/><rect x="17" y="13" width="4" height="7" rx="1.5"/>',
    book:'<path d="M12 6C10 4.5 6.5 4.5 4 5v14c2.5-.5 6-.5 8 1 2-1.5 5.5-1.5 8-1V5c-2.5-.5-6-.5-8 1z"/><path d="M12 6v14"/>',
    heart:'<path d="M12 20s-7-4.5-9.5-9C1 8 2.5 4.5 6 4.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.5 0 5 3.5 3.5 6.5C19 15.5 12 20 12 20z"/>',
    play:'<path d="M8 5l11 7-11 7z"/>',
    chev:'<path d="M9 6l6 6-6 6"/>',
    swap:'<path d="M7 4L3 8l4 4"/><path d="M3 8h13"/><path d="M17 20l4-4-4-4"/><path d="M21 16H8"/>'
  };
  function svg(name,cls){ return '<svg class="'+(cls||'ic')+'" viewBox="0 0 24 24">'+ICON[name]+'</svg>'; }

  var PIEZA={
    explicacion:{ic:'doc',label:"Explicación completa",fmt:"Documento PDF",short:"Explicación"},
    mapa:{ic:'map',label:"Mapa, flashcards y discrepancias",fmt:"Estudio interactivo",short:"Mapa"},
    audio:{ic:'head',label:"Audiolibro",fmt:"Para escuchar en el dispositivo",short:"Audio"},
    explicacion_simple:{ic:'book',label:"Explicación clara",fmt:"Para escuchar y leer",short:"Explicación"}
  };
  var ORDEN={ josue:["explicacion","mapa","audio"], jeanette:["explicacion_simple","audio"] };
  var PERFIL={
    josue:{nombre:"Josué",ini:"Jo",role:"Versión avanzada",saludo:"Todo tu diplomado, masticado y a la mano."},
    jeanette:{nombre:"Jeanette",ini:"Je",role:"Versión clara",saludo:"La IA sin tecnicismos, a tu ritmo."}
  };

  var DATA=(window.CONTENIDO&&window.CONTENIDO.archivos)?window.CONTENIDO.archivos:{josue:{},jeanette:{}};
  var AUDIOLIBROS=(window.CONTENIDO&&window.CONTENIDO.audiolibros)?window.CONTENIDO.audiolibros:{};
  function rawHas(p,u,t){ return !!(DATA[p]&&DATA[p][u]&&DATA[p][u][t]); }
  function has(p,u,t){ if(t==="audio") return !!(rawHas(p,u,"audio")||AUDIOLIBROS[u]); return rawHas(p,u,t); }
  function path(p,u,t){ if(t==="audio") return (DATA[p]&&DATA[p][u]&&DATA[p][u].audio)||AUDIOLIBROS[u]||null; return (DATA[p]&&DATA[p][u]&&DATA[p][u][t])?DATA[p][u][t]:null; }
  var AUDIO_EXT=/\.(mp3|m4a|wav|aac|ogg|opus|mp4)$/i;
  function href(pth){ return pth.split('/').map(encodeURIComponent).join('/'); }

  function $(id){return document.getElementById(id);}
  var toastEl=$("toast"),state={p:"josue",view:"doors",u:null,section:"inicio"},filter="";

  function statusOf(p,n){
    var piezas=ORDEN[p],have=0,i;
    for(i=0;i<piezas.length;i++){ if(has(p,n,piezas[i])) have++; }
    if(have===0) return {k:"pendiente",have:0,tot:piezas.length};
    if(have===piezas.length) return {k:"completa",have:have,tot:piezas.length};
    return {k:"parcial",have:have,tot:piezas.length};
  }
  function pbar(pct){ return '<div class="pbar"><span style="width:'+pct+'%"></span></div>'; }
  function accent(p){ return p==="jeanette"?"--c:var(--jeanette);--c2:var(--jeanette-2)":"--c:var(--josue);--c2:var(--josue-2)"; }
  function showScreen(id){ var s=["v-doors","v-app"],i;for(i=0;i<s.length;i++)$(s[i]).classList.toggle("active",s[i]===id); window.scrollTo(0,0); }

  function paintDoorBars(){
    var ds=document.querySelectorAll(".prog[data-door]"),i;
    for(i=0;i<ds.length;i++){
      var p=ds[i].getAttribute("data-door"),done=0,k;
      for(k=0;k<UNIDADES.length;k++){ if(statusOf(p,UNIDADES[k].n).k!=="pendiente") done++; }
      ds[i].setAttribute("style",accent(p));
      ds[i].innerHTML='<div class="plabel"><span>Progreso</span><span>'+done+' / 6 unidades</span></div>'+pbar(Math.round(done/6*100));
    }
  }

  var NAV=[["home","Inicio","inicio"],["doc","Explicaciones","explicaciones"],["head","Audiolibros","audiolibros"]];
  function navShort(sec){ return sec==="explicaciones"?"Explica.":(sec==="audiolibros"?"Audios":"Inicio"); }
  function isOn(sec){ return state.view==="home" && state.section===sec; }

  function sidebar(p){
    var perf=PERFIL[p],i;
    var h='<div class="s-brand"><div class="s-logo">A</div><div class="t">Aula <em>IA</em></div></div>';
    h+='<div class="s-nav"><div class="s-lbl">Menú</div>';
    for(i=0;i<NAV.length;i++) h+='<button class="nav-i'+(isOn(NAV[i][2])?" on":"")+'" data-sec="'+NAV[i][2]+'">'+svg(NAV[i][0])+'<span>'+NAV[i][1]+'</span></button>';
    h+='</div><div class="s-spacer"></div>';
    h+='<button class="nav-i" id="side-swap">'+svg("swap")+'<span>Cambiar perfil</span></button>';
    h+='<div class="account"><div class="ava">'+perf.ini+'</div><div class="who"><div class="n">'+perf.nombre+'</div><div class="r">'+perf.role+'</div></div></div>';
    return h;
  }
  function botnav(){
    var h="",i;
    for(i=0;i<NAV.length;i++) h+='<button'+(isOn(NAV[i][2])?' class="on"':'')+' data-sec="'+NAV[i][2]+'">'+svg(NAV[i][0])+'<span>'+navShort(NAV[i][2])+'</span></button>';
    h+='<button data-swap="1">'+svg("swap")+'<span>Perfil</span></button>';
    return h;
  }

  function rowsHtml(p){
    var h="",i;
    for(i=0;i<UNIDADES.length;i++){
      var un=UNIDADES[i]; if(filter && un.t.toLowerCase().indexOf(filter)<0 && (""+un.n).indexOf(filter)<0) continue;
      var st=statusOf(p,un.n),lbl=st.k==="completa"?"Completa":(st.k==="parcial"?"En progreso":"Pendiente");
      var meta=st.k==="pendiente"?"Aún sin material":(st.have+" de "+st.tot+" piezas");
      h+='<button class="row" style="'+accent(p)+'" data-u="'+un.n+'"><span class="rn">'+(un.n<10?"0":"")+un.n+'</span>'+
        '<span class="rmid"><span class="rt">'+un.t+'</span><div class="rmeta">'+meta+'</div>'+pbar(Math.round(st.have/st.tot*100))+'</span>'+
        '<span class="rst '+st.k+'">'+lbl+'</span><span class="rchev">'+svg("chev")+'</span></button>';
    }
    if(!h) h='<div class="mod-empty">Sin resultados para “'+filter+'”.</div>';
    return h;
  }
  function audioHtml(p,all){
    var h="",i,shown=0,lim=all?99:4;
    for(i=0;i<UNIDADES.length&&shown<lim;i++){
      var un=UNIDADES[i],on=has(p,un.n,"audio");
      if(all){ if(!on) continue; }
      else { if(!on && statusOf(p,un.n).k==="pendiente") continue; }
      shown++;
      var bars="";for(var k=0;k<11;k++){var hh=6+((k*7+un.n*5)%20);bars+='<i style="height:'+hh+'px"></i>';}
      var pth=on?path(p,un.n,"audio"):null;
      var play=on?'<a class="aplay" href="'+href(pth)+'" target="_blank" rel="noopener"><span class="pbtn">'+svg("play","ic")+'</span>Escuchar</a>':'<span class="aplay"><span class="pbtn">'+svg("play","ic")+'</span>Pronto</span>';
      h+='<div class="acard'+(on?"":" off")+'"><div class="ah"><div class="aic">'+svg("head")+'</div><div class="at">Unidad '+un.n+'</div></div><div class="wave">'+bars+'</div>'+play+'</div>';
    }
    if(!h) h='<div class="mod-empty" style="grid-column:1/-1">Aún no hay audiolibros cargados.</div>';
    return h;
  }
  function ellaItems(){
    var h="",i,shown=0;
    for(i=0;i<UNIDADES.length&&shown<4;i++){
      var un=UNIDADES[i]; if(!rawHas("jeanette",un.n,"explicacion_simple")) continue; shown++;
      h+='<button class="ella-item" data-ella="'+un.n+'"><span class="eic">'+svg("book")+'</span><span class="en">Unidad '+un.n+' · '+un.t+'</span><span class="echev">'+svg("chev")+'</span></button>';
    }
    if(!h) h='<div style="padding:16px 20px;color:var(--muted);font-size:13px">Aún no hay explicaciones cargadas para Jeanette.</div>';
    return h;
  }

  function home(p){
    var sec=state.section||"inicio",perf=PERFIL[p],i;
    var titulo=sec==="explicaciones"?"Explicaciones":(sec==="audiolibros"?"Audiolibros":"Hola, "+perf.nombre+" 👋");
    var sub=sec==="explicaciones"?"Toca una unidad para ver su material.":(sec==="audiolibros"?"Escucha la unidad mientras haces otras cosas.":perf.saludo);
    var h='<div class="greet"><h2 class="serif">'+titulo+'</h2><p>'+sub+'</p></div>';
    if(sec==="inicio"||sec==="explicaciones"){
      var done=0;for(i=0;i<UNIDADES.length;i++){if(statusOf(p,UNIDADES[i].n).k!=="pendiente")done++;}
      h+='<div><div class="sec-h"><h3 class="serif">Unidades del curso</h3><span class="cnt">'+done+' / 6 con material</span></div><div class="rows" id="rows">'+rowsHtml(p)+'</div></div>';
    }
    if(sec==="inicio"||sec==="audiolibros"){
      h+='<div><div class="sec-h"><h3 class="serif">Audiolibros</h3></div><div class="audio-row">'+audioHtml(p,sec==="audiolibros")+'</div></div>';
    }
    if(sec==="inicio"&&p==="josue"){
      h+='<div class="ella"><div class="ella-h"><div class="ei">'+svg("heart")+'</div><div class="etext"><h3 class="serif">Para Jeanette</h3><p>Contenido claro y simple para que entienda lo importante.</p></div><button class="ego" id="ella-go">Ir a su sección '+svg("chev","ic")+'</button></div><div class="ella-list">'+ellaItems()+'</div></div>';
    }
    return h;
  }

  function modHtml(p,n){
    var un=null,i;for(i=0;i<UNIDADES.length;i++)if(UNIDADES[i].n===n)un=UNIDADES[i];
    var st=statusOf(p,n),piezas=ORDEN[p];
    var h='<button class="mod-back" id="mod-back">'+svg("chev","ic")+' Volver</button>'+
      '<div class="mod-head"><div class="u-n">Unidad '+n+' · '+PERFIL[p].nombre+'</div><h2 class="serif">'+un.t+'</h2></div>'+
      '<div class="mod-prog"><div class="plabel"><span>Material de la unidad</span><span>'+st.have+' / '+st.tot+'</span></div>'+pbar(Math.round(st.have/st.tot*100))+'</div><div class="pieces">';
    var any=false;
    for(i=0;i<piezas.length;i++){
      var key=piezas[i],on=has(p,n,key),m=PIEZA[key],pth=on?path(p,n,key):null,act;
      if(on){
        if(key==="audio"&&AUDIO_EXT.test(pth)){ act='<span class="soon" style="visibility:hidden">.</span>'; }
        else { act='<a class="open" href="'+href(pth)+'" target="_blank" rel="noopener">Abrir '+svg("chev","ic")+'</a>'; }
      } else { act='<span class="soon">Aún no está</span>'; }
      h+='<div class="piece '+key+'"><div class="pic">'+svg(m.ic)+'</div><div class="info"><div class="t">'+m.label+'</div><div class="f">'+m.fmt+'</div></div><div class="act">'+act+'</div>';
      if(on&&key==="audio"&&AUDIO_EXT.test(pth)) h+='<div style="flex:1 1 100%;order:5"><audio style="width:100%;margin-top:6px;height:38px" controls preload="none" src="'+href(pth)+'"></audio></div>';
      h+='</div>';
      if(on)any=true;
    }
    h+='</div>';
    if(!any) h+='<div class="mod-empty">Esta unidad todavía no tiene material.<br>Cuando arrastres su archivo y actualices, aparece aquí.</div>';
    return h;
  }

  function renderDash(){
    $("sidebar").innerHTML=sidebar(state.p);
    $("sidebar").setAttribute("style",accent(state.p));
    $("botnav").innerHTML=botnav();
    $("toptag").textContent=PERFIL[state.p].nombre;
    $("content").innerHTML=(state.view==="mod")?modHtml(state.p,state.u):home(state.p);
    wire();
  }

  function enter(p){ state.p=p;state.view="home";state.section="inicio";showScreen("v-app");renderDash(); }
  function openMod(n){ state.view="mod";state.u=n;renderDash();window.scrollTo(0,0); }
  function switchProfile(){ state.p=state.p==="josue"?"jeanette":"josue";state.view="home";state.section="inicio";filter="";renderDash(); }
  function setSection(s){ state.section=s;state.view="home";renderDash();window.scrollTo(0,0); }

  function wire(){
    var rows=document.querySelectorAll(".row"),i;
    for(i=0;i<rows.length;i++) rows[i].onclick=function(){ openMod(parseInt(this.getAttribute("data-u"),10)); };
    var mb=$("mod-back"); if(mb) mb.onclick=function(){ state.view="home";renderDash(); };
    var sw=$("side-swap"); if(sw) sw.onclick=switchProfile;
    var eg=$("ella-go"); if(eg) eg.onclick=switchProfile;
    var eis=document.querySelectorAll(".ella-item"),j;
    for(j=0;j<eis.length;j++) eis[j].onclick=function(){ state.p="jeanette";openMod(parseInt(this.getAttribute("data-ella"),10)); };
    var navs=document.querySelectorAll(".nav-i[data-sec]"),k;
    for(k=0;k<navs.length;k++) navs[k].onclick=function(){ setSection(this.getAttribute("data-sec")); };
    var bn=document.querySelectorAll("#botnav button"),b;
    for(b=0;b<bn.length;b++) bn[b].onclick=function(){
      if(this.getAttribute("data-swap")){ switchProfile(); return; }
      setSection(this.getAttribute("data-sec"));
    };
  }

  var tmr; function toast(m){ toastEl.textContent=m;toastEl.classList.add("show");clearTimeout(tmr);tmr=setTimeout(function(){toastEl.classList.remove("show");},1900); }

  var doors=document.querySelectorAll(".door"),d;
  for(d=0;d<doors.length;d++) doors[d].onclick=function(){ enter(this.getAttribute("data-p")); };

  document.addEventListener("input",function(e){ if(e.target&&e.target.id==="search"){ filter=e.target.value.toLowerCase().trim(); var rc=$("rows"); if(rc){rc.innerHTML=rowsHtml(state.p);wire();} } });

  function setTheme(t){ document.documentElement.setAttribute("data-theme",t);
    var lbl=t==="dark"?"☾":"☀"; var a=$("theme-fab"),b=$("theme-btn"); if(a)a.textContent=lbl; if(b)b.textContent=lbl;
    try{localStorage.setItem("aulaia-theme",t);}catch(e){} }
  (function(){ var s=null; try{s=localStorage.getItem("aulaia-theme");}catch(e){}
    if(!s){ s=(window.matchMedia&&matchMedia("(prefers-color-scheme:light)").matches)?"light":"dark"; }
    setTheme(s); })();
  function toggleTheme(){ setTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"); }
  $("theme-fab").onclick=toggleTheme; document.addEventListener("click",function(e){ if(e.target&&e.target.id==="theme-btn") toggleTheme(); });

  paintDoorBars(); showScreen("v-doors");
})();
</script>
</body>
</html>
